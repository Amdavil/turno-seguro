<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Turno Seguro 3D — Modo Aventura</title>
<style>
  :root {
    --ink: #1F262A; --muted: #5B6871; --line: #D5DCD3;
    --green: #00795C; --green-hi: #009B76; --green-deep: #00503B; --green-soft: #DFF0E8;
    --yellow: #F2B705; --yellow-ink: #8A6200;
    --red: #B62233; --red-soft: #FADDE0;
    --blue: #0A5CA8; --blue-soft: #E0EDF9;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  html, body { margin: 0; height: 100%; }
  body {
    background: linear-gradient(165deg, #22282B 0%, #14181A 100%);
    font-family: "Segoe UI", -apple-system, Roboto, sans-serif;
    color: var(--ink);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; overflow: hidden;
  }
  #stage {
    position: relative; width: min(100vw, 178vh); aspect-ratio: 16/9;
    max-width: 1180px; box-shadow: 0 30px 80px rgba(0,0,0,0.65);
    border-radius: 12px; overflow: hidden; background: #BFDDE8;
  }
  #stage canvas { display: block; width: 100% !important; height: 100% !important; }
  #stage.frozen canvas { filter: grayscale(1) contrast(1.15); }
  #stage.shake { animation: shake 0.5s both; }
  @keyframes shake {
    10%,90% { transform: translateX(-3px); } 20%,80% { transform: translateX(5px); }
    30%,50%,70% { transform: translateX(-8px); } 40%,60% { transform: translateX(8px); }
  }
  #hud {
    position: absolute; top: 10px; left: 10px; right: 10px;
    display: flex; align-items: center; gap: 10px; z-index: 10;
    background: rgba(255,255,255,0.9); backdrop-filter: blur(6px);
    border-radius: 12px; padding: 7px 12px; font-size: 14px; font-weight: 700;
    box-shadow: 0 6px 16px rgba(0,0,0,0.3);
  }
  #hud .pts { color: var(--green); font-size: 17px; font-variant-numeric: tabular-nums; white-space: nowrap; }
  #hud .bienwrap { flex: 1; }
  #hud .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.09em; color: var(--muted); }
  .bar { height: 11px; background: rgba(31,38,42,0.15); border-radius: 8px; overflow: hidden; }
  .bar > div { height: 100%; border-radius: 8px; background: linear-gradient(180deg, var(--green-hi), var(--green)); transition: width 0.3s; }
  .bar.warn > div { background: linear-gradient(180deg, #FFCB2E, var(--yellow)); }
  .bar.low > div { background: linear-gradient(180deg, #D53A4C, var(--red)); animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: 0.5; } }
  #hud button { background: none; border: none; font-size: 18px; cursor: pointer; padding: 2px; }
  #objetivo {
    position: absolute; top: 56px; left: 50%; transform: translateX(-50%);
    z-index: 9; max-width: 92%;
    background: rgba(31,38,42,0.85); color: #fff;
    border-radius: 999px; padding: 7px 18px;
    font-size: 13.5px; font-weight: 700; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
    box-shadow: 0 6px 16px rgba(0,0,0,0.35);
  }
  #objetivo .chip { color: #FFD54F; margin-right: 6px; }
  #toast {
    position: absolute; top: 96px; left: 50%; transform: translateX(-50%);
    max-width: 88%; z-index: 10; display: none;
    background: linear-gradient(180deg, #FFFFFF, var(--blue-soft));
    border: 1px solid rgba(10,92,168,0.25); border-radius: 14px;
    padding: 9px 16px; font-size: 14.5px; font-weight: 600;
    box-shadow: 0 8px 20px rgba(0,0,0,0.35);
    animation: toastIn 0.3s ease both;
  }
  #toast strong { color: var(--blue); }
  @keyframes toastIn { from { opacity: 0; transform: translate(-50%,-8px); } to { opacity: 1; transform: translate(-50%,0); } }
  #ruidoFx {
    position: absolute; inset: 0; pointer-events: none; z-index: 8; display: none;
    box-shadow: inset 0 0 90px 30px rgba(182,34,51,0.55);
    animation: pulse 0.8s infinite;
  }
  #overlay {
    position: absolute; inset: 0; z-index: 20; display: none;
    background: rgba(14,20,18,0.62); backdrop-filter: blur(3px);
    align-items: center; justify-content: center; padding: 16px;
  }
  #overlay.visible { display: flex; }
  .panel {
    background: #fff; border-radius: 20px; padding: 22px 24px;
    max-width: 500px; width: 100%; max-height: 92%; overflow-y: auto;
    box-shadow: 0 24px 60px rgba(0,0,0,0.45);
    animation: panelIn 0.32s cubic-bezier(0.2,1.4,0.4,1) both;
  }
  @keyframes panelIn { from { opacity: 0; transform: scale(0.85) translateY(18px); } to { opacity: 1; transform: none; } }
  .panel.bad { border-top: 8px solid var(--red); }
  .panel.ok { border-top: 8px solid var(--green); }
  .panel.info { border-top: 8px solid var(--blue); }
  .panel h2 { margin: 0 0 8px; font-size: 22px; font-weight: 800; }
  .panel h2.alerta { color: var(--red); }
  .panel .exp {
    background: var(--blue-soft); border-left: 4px solid var(--blue);
    border-radius: 10px; padding: 10px 14px; font-size: 14.5px; margin: 12px 0;
  }
  .panel .exp strong { color: var(--blue); }
  .panel .regla { font-size: 17px; font-weight: 800; text-align: center; padding: 8px; color: var(--yellow-ink); }
  .btn {
    display: block; width: 100%; border: none; cursor: pointer;
    background: linear-gradient(180deg, var(--green-hi), var(--green));
    color: #fff; font-weight: 800; font-size: 16.5px; padding: 13px 18px;
    border-radius: 14px; font-family: inherit; margin: 9px 0;
    box-shadow: 0 4px 0 var(--green-deep), 0 8px 18px rgba(0,0,0,0.2);
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 0 0 var(--green-deep); }
  .btn.sec { background: #fff; color: var(--ink); border: 2px solid var(--line); box-shadow: 0 3px 0 var(--line); }
  .kit-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 12px 0; }
  .kit-item {
    border: 2px solid var(--line); background: #fff; border-radius: 12px;
    padding: 8px 4px; text-align: center; cursor: pointer; font-family: inherit;
    font-size: 11px; font-weight: 600; color: var(--ink); box-shadow: 0 3px 0 var(--line);
  }
  .kit-item .ico { font-size: 24px; display: block; }
  .kit-item.sel { border-color: var(--green); background: var(--green-soft); box-shadow: 0 3px 0 var(--green); }
  .kit-item.errado { border-color: var(--red); background: var(--red-soft); }
  .medallas { display: flex; gap: 10px; justify-content: center; margin: 10px 0; flex-wrap: wrap; }
  .medalla { text-align: center; font-size: 12px; font-weight: 700; width: 100px; }
  .medalla .ico { font-size: 34px; display: block; filter: drop-shadow(0 3px 5px rgba(0,0,0,0.25)); }
  .medalla.off { opacity: 0.3; filter: grayscale(1); }
  .res-pct {
    font-size: 54px; font-weight: 900; text-align: center; line-height: 1.05;
    background: linear-gradient(120deg, var(--green), var(--blue));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .nivel { display: block; text-align: center; font-size: 16px; font-weight: 800; margin: 6px 0; }
  input[type=text] {
    width: 100%; font-size: 17px; padding: 12px 14px; border-radius: 12px;
    border: 2px solid var(--line); font-family: inherit; margin: 6px 0 12px;
  }
  .ctl-demo { display: flex; gap: 14px; justify-content: center; margin: 10px 0; }
  .ctl-demo .k {
    background: #fff; border: 2px solid var(--line); border-radius: 10px;
    box-shadow: 0 3px 0 var(--line); padding: 8px 14px;
    font-weight: 800; font-size: 15px; text-align: center;
  }
  .ctl-demo .k small { display: block; font-size: 10.5px; font-weight: 600; color: var(--muted); }
  #irBtn {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    z-index: 11; border: none; cursor: pointer; font-family: inherit;
    background: linear-gradient(180deg, var(--green-hi), var(--green));
    color: #fff; font-weight: 800; font-size: 17px; padding: 14px 30px;
    border-radius: 999px; text-shadow: 0 1px 2px rgba(0,0,0,0.25);
    box-shadow: 0 5px 0 var(--green-deep), 0 12px 28px rgba(0,0,0,0.4);
    animation: latido 1.6s ease-in-out infinite;
  }
  #irBtn:active { transform: translate(-50%, 4px); box-shadow: 0 0 0 var(--green-deep); }
  #irBtn.activo {
    background: linear-gradient(180deg, #FFCB2E, var(--yellow));
    color: var(--ink); text-shadow: none; animation: none;
    box-shadow: 0 5px 0 #8A6200, 0 12px 28px rgba(0,0,0,0.4);
  }
  @keyframes latido { 0%,100% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.06); } }
  #hud button.apagado { opacity: 0.35; }
  .flash {
    position: absolute; inset: 0; pointer-events: none; z-index: 15;
    background: radial-gradient(ellipse at center, rgba(182,34,51,0) 35%, rgba(182,34,51,0.45) 100%);
    animation: flashOut 0.8s ease-out forwards;
  }
  @keyframes flashOut { to { opacity: 0; } }
  .confetti { position: absolute; inset: 0; pointer-events: none; z-index: 25; overflow: hidden; }
  .confetti i { position: absolute; top: -16px; width: 9px; height: 14px; border-radius: 2px; animation: cf linear forwards; }
  @keyframes cf { to { transform: translateY(110vh) rotate(680deg); } }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
</style>
</head>
<body>
<div id="stage">
  <div id="hud">
    <span style="font-size:20px">👷</span>
    <span class="pts" id="hudPts">0 pts</span>
    <div class="bienwrap">
      <div class="lbl" id="hudBienLbl">Bienestar 100%</div>

<script type="importmap">{ "imports": { "three": "./three.module.min.js" } }</script>
<script type="module">
import * as THREE from "three";
import { GLTFLoader } from "./GLTFLoader.js";
import * as SkeletonUtils from "./SkeletonUtils.js";
/* =====================================================================
   TURNO SEGURO 3D — MODO AVENTURA (estilo bloques, tercera persona)
   Toca el piso a donde quieras ir · WASD / flechas también sirven.
   Al llegar a un punto verde ⚡ el personaje lo usa automáticamente.
   ===================================================================== */

const stage = document.getElementById("stage"), overlay = document.getElementById("overlay");
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

/* ---------- Estado ---------- */
const S = {
  nombre: "", x: 3, z: 0, yaw: Math.PI / 2, andando: false, animT: 0,
  epp: false, oidos: false, inv: 0,
  puntos: 0, bien: 100, errores: 0, errs: {}, reportes: 0,
  checkpoint: { x: 3, z: 0 }, pausado: true, fin: false, t: 0,
  flags: { apilado: false, contacto: false, electrico: false,
           cables: false, derrame: false, pausa: false,
           archivo: false, ergo: false, cierre: false,
           alarma: false, evacT0: 0, evacBonus: false,
           kitIntentos: 0, avisos: {} },
  limpio: { bodega: true, monta: true, ruido: true, carrito: true }
};
const MAX = 295;
let target = null;     /* {x,z} destino del toque */
let autoPilot = false; /* guía automática hacia el objetivo */
const irBtn = document.getElementById("irBtn");
function setIrBtn() {
  irBtn.textContent = autoPilot ? "⏸ Pausar guía" : "👣 Ir al objetivo";
  irBtn.classList.toggle("activo", autoPilot);
}
irBtn.addEventListener("pointerdown", e => {
  e.preventDefault();
  if (S.pausado || S.fin) return;
  autoPilot = !autoPilot;
  setIrBtn();
  if (autoPilot) sndPick();
});

/* ---------- Audio: efectos, música y ambiente ---------- */
let actx = null, muted = false, musicaOn = true, musTimer = null, ambInicio = false;
function tone(seq, vol) {
  if (muted) return;
  try {
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    let t = actx.currentTime;
    seq.forEach(p => {
      const o = actx.createOscillator(), g = actx.createGain();
      o.type = p.w || "sine"; o.frequency.value = p.f;
      g.gain.setValueAtTime(vol || 0.1, t); g.gain.exponentialRampToValueAtTime(0.001, t + p.d);
      o.connect(g); g.connect(actx.destination); o.start(t); o.stop(t + p.d); t += p.d * 0.85;
    });
  } catch (e) {}
}
const sndOk = () => tone([{f:523,d:0.12},{f:784,d:0.2}]);
const sndBad = () => tone([{f:330,d:0.15},{f:196,d:0.3}]);
const sndAlerta = () => tone([{f:880,d:0.1,w:"square"},{f:880,d:0.1,w:"square"}]);
const sndPick = () => tone([{f:660,d:0.08},{f:880,d:0.1}]);
const sndBeep = () => tone([{f:740,d:0.09,w:"square"}]);
const sndPaso = () => tone([{f:150,d:0.05,w:"triangle"}], 0.035);
const sndThud = () => tone([{f:75,d:0.22,w:"sine"}], 0.14);
const sndFanfarria = () => tone([{f:523,d:0.14},{f:659,d:0.14},{f:784,d:0.14},{f:1047,d:0.4}], 0.12);
function nota(f, t0, dur, vol, tipo) {
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = tipo; o.frequency.value = f;
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.linearRampToValueAtTime(vol, t0 + 0.09);
  g.gain.setValueAtTime(vol, t0 + dur * 0.65);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  o.connect(g); g.connect(actx.destination);
  o.start(t0); o.stop(t0 + dur + 0.05);
}
function iniciarAudioFondo() {
  try {
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === "suspended") actx.resume();
    /* zumbido ambiente de fábrica (una sola vez) */
    if (!ambInicio) {
      ambInicio = true;
      const buf = actx.createBuffer(1, actx.sampleRate * 2, actx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
      const src = actx.createBufferSource(); src.buffer = buf; src.loop = true;
      const fil = actx.createBiquadFilter(); fil.type = "lowpass"; fil.frequency.value = 170;
      const g = actx.createGain(); g.gain.value = 0.016;
      src.connect(fil); fil.connect(g); g.connect(actx.destination); src.start();
      const hum = actx.createOscillator(); hum.frequency.value = 55;
      const hg = actx.createGain(); hg.gain.value = 0.011;
      hum.connect(hg); hg.connect(actx.destination); hum.start();
    }
    /* música de fondo: progresión C–Am–F–G suave */
    if (musTimer) return;
    let barra = 0;
    const AC = [[261.6, 329.6, 392.0], [220.0, 261.6, 329.6], [174.6, 220.0, 261.6], [196.0, 246.9, 293.7]];
    const compas = () => {
      if (!musicaOn || muted) { barra++; return; }
      try {
        const t0 = actx.currentTime + 0.06, ch = AC[barra % 4];
        ch.forEach(f => nota(f, t0, 1.9, 0.02, "triangle"));
        nota(ch[0] / 2, t0, 1.85, 0.05, "sine");
        for (let i = 0; i < 4; i++) nota(ch[(i * 2) % 3] * 2, t0 + i * 0.5, 0.26, 0.015, "sine");
        barra++;
      } catch (e) {}
    };
    compas();
    musTimer = setInterval(compas, 2000);
  } catch (e) {}
}
document.getElementById("muteBtn").onclick = function () {
  muted = !muted; this.textContent = muted ? "🔇" : "🔊";
};
document.getElementById("musBtn").onclick = function () {
  musicaOn = !musicaOn; this.classList.toggle("apagado", !musicaOn);
};

/* ---------- Three.js: escena base ---------- */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xBFDDE8);
scene.fog = new THREE.Fog(0xBFDDE8, 38, 92);
const camera = new THREE.PerspectiveCamera(50, 16 / 9, 0.1, 300);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
renderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
stage.insertBefore(renderer.domElement, stage.firstChild);
function resize() {
  const w = stage.clientWidth, h = stage.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h; camera.updateProjectionMatrix();
}
addEventListener("resize", resize); resize();

scene.add(new THREE.HemisphereLight(0xffffff, 0x8fa48f, 0.95));
const sol = new THREE.DirectionalLight(0xfff3d6, 1.5);
sol.castShadow = true;
sol.shadow.mapSize.set(1024, 1024);
sol.shadow.camera.left = -22; sol.shadow.camera.right = 22;
sol.shadow.camera.top = 22; sol.shadow.camera.bottom = -22;
sol.shadow.camera.near = 1; sol.shadow.camera.far = 90;
scene.add(sol); scene.add(sol.target);

/* ---------- Utilidades de construcción ---------- */
const MAT = {};
function mat(c) { if (!MAT[c]) MAT[c] = new THREE.MeshLambertMaterial({ color: c }); return MAT[c]; }
function caja(w, h, d, c, sombra) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat(c));
  if (sombra !== false) m.castShadow = true;
  m.receiveShadow = true;
  return m;
}
function letreroTex(texto, bg, fg, fs) {
  const cv2 = document.createElement("canvas"); cv2.width = 512; cv2.height = 128;
  const c2 = cv2.getContext("2d");
  c2.fillStyle = bg; c2.fillRect(0, 0, 512, 128);
  c2.strokeStyle = "rgba(0,0,0,0.25)"; c2.lineWidth = 8; c2.strokeRect(4, 4, 504, 120);
  c2.fillStyle = fg; c2.font = "900 " + (fs || 56) + "px Segoe UI"; c2.textAlign = "center"; c2.textBaseline = "middle";
  c2.fillText(texto, 256, 68);
  return new THREE.CanvasTexture(cv2);
}
function letrero(texto, w, h, bg, fg, fs) {
  const m = new THREE.Mesh(new THREE.PlaneGeometry(w, h),
    new THREE.MeshBasicMaterial({ map: letreroTex(texto, bg, fg, fs) }));
  return m;
}
function spriteEmoji(emoji, escala) {
  const cv2 = document.createElement("canvas"); cv2.width = 128; cv2.height = 128;
  const c2 = cv2.getContext("2d");
  c2.font = "96px Segoe UI Emoji, Segoe UI"; c2.textAlign = "center"; c2.textBaseline = "middle";
  c2.fillText(emoji, 64, 70);
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(cv2), transparent: true }));
  sp.scale.set(escala, escala, 1);
  return sp;
}
function anillo(rIn, rOut, color, op) {
  const m = new THREE.Mesh(new THREE.RingGeometry(rIn, rOut, 40),
    new THREE.MeshBasicMaterial({ color, transparent: true, opacity: op, side: THREE.DoubleSide, depthWrite: false }));
  m.rotation.x = -Math.PI / 2; m.position.y = 0.04;
  return m;
}
function plano(w, d, color, op) {
  const m = new THREE.Mesh(new THREE.PlaneGeometry(w, d),
    new THREE.MeshBasicMaterial({ color, transparent: true, opacity: op, depthWrite: false }));
  m.rotation.x = -Math.PI / 2; m.position.y = 0.03;
  return m;
}

/* ---------- Mundo ---------- */
const piso = new THREE.Mesh(new THREE.PlaneGeometry(420, 80), mat(0x9DB59B));
piso.rotation.x = -Math.PI / 2; piso.receiveShadow = true;
piso.position.set(75, 0, 0);
scene.add(piso);
const grid = new THREE.GridHelper(420, 105, 0x7E967E, 0x8AA38A);
grid.material.transparent = true; grid.material.opacity = 0.22;
grid.position.set(75, 0.02, 0);
scene.add(grid);
/* pasillo peatonal */
const senda = plano(260, 4.6, 0xC3CEB9, 0.85); senda.position.set(128, 0.025, 0); scene.add(senda);
[-2.4, 2.4].forEach(z => {
  const l = new THREE.Mesh(new THREE.BoxGeometry(260, 0.04, 0.16), new THREE.MeshBasicMaterial({ color: 0xF2B705 }));
  l.position.set(128, 0.04, z); scene.add(l);
});
/* alfombra del mundo oficina */
const alfombra = plano(138, 13, 0x9FB2C8, 0.55); alfombra.position.set(190, 0.02, 0); scene.add(alfombra);
/* muro trasero con ventanas */
const muro = caja(285, 7, 0.6, 0xD8DEE2, false); muro.position.set(127, 3.5, -6.6); muro.receiveShadow = true; scene.add(muro);
for (let x = 6; x < 252; x += 12) {
  const v = new THREE.Mesh(new THREE.PlaneGeometry(5, 2.6), new THREE.MeshBasicMaterial({ color: 0xCBE8F5 }));
  v.position.set(x, 4.4, -6.28), scene.add(v);
}
/* puerta divisoria entre mundos */
const marco = caja(0.8, 5, 1.2, 0x546E7A, false); marco.position.set(120, 2.5, -5.9); scene.add(marco);
const marcoSign = letrero("→ OFICINAS", 4.2, 1.1, "#0A5CA8", "#fff", 54);
marcoSign.position.set(120, 4.6, -5.2); scene.add(marcoSign);
/* letreros de zona */
[["VESTIER", 7, 0x0A5CA8], ["BODEGA", 30, 0x0A5CA8], ["MONTACARGAS", 57, 0x8A6200],
 ["ZONA DE RUIDO · 95 dB", 86, 0x8A6200], ["RIESGO ELÉCTRICO", 106, 0xB62233],

/* ---------- Personaje humano estilizado (low-poly realista) ---------- */
function humano(op) {
  op = Object.assign({ piel: 0xD9A066, camisa: 0x1565C0, pantalon: 0x37474F, pelo: 0x3E2723 }, op);
  const g = new THREE.Group();
  const p = { g };
  const capsula = (r, len, c) => {
    const m = new THREE.Mesh(new THREE.CapsuleGeometry(r, len, 4, 10), mat(c));
    m.castShadow = true; return m;
  };
  /* piernas articuladas: muslo → rodilla → espinilla → zapato */
  ["L", "R"].forEach((lado, i) => {
    const sx = i === 0 ? -0.15 : 0.15;
    const muslo = new THREE.Group(); muslo.position.set(sx, 1.14, 0); g.add(muslo);
    const mM = capsula(0.115, 0.30, op.pantalon); mM.position.y = -0.25; muslo.add(mM);
    const espinilla = new THREE.Group(); espinilla.position.y = -0.52; muslo.add(espinilla);
    const mE = capsula(0.095, 0.28, op.pantalon); mE.position.y = -0.22; espinilla.add(mE);
    const zapato = caja(0.19, 0.12, 0.34, 0x212121); zapato.position.set(0, -0.50, 0.07); espinilla.add(zapato);
    p["muslo" + lado] = muslo; p["espinilla" + lado] = espinilla;
  });
  /* cadera y torso redondeado */
  const cadera = new THREE.Mesh(new THREE.CylinderGeometry(0.26, 0.29, 0.22, 12), mat(op.pantalon));
  cadera.position.y = 1.18; cadera.castShadow = true; g.add(cadera);
  const torso = new THREE.Mesh(new THREE.CapsuleGeometry(0.30, 0.42, 6, 12), mat(op.camisa));
  torso.scale.z = 0.68; torso.position.y = 1.55; torso.castShadow = true; g.add(torso);
  /* brazos articulados: hombro → codo → antebrazo → mano */
  ["L", "R"].forEach((lado, i) => {
    const sx = i === 0 ? -0.40 : 0.40;
    const hombro = new THREE.Group(); hombro.position.set(sx, 1.80, 0); g.add(hombro);
    const bola = new THREE.Mesh(new THREE.SphereGeometry(0.11, 10, 8), mat(op.camisa));
    bola.castShadow = true; hombro.add(bola);
    const mB = capsula(0.085, 0.24, op.camisa); mB.position.y = -0.20; hombro.add(mB);
    const codo = new THREE.Group(); codo.position.y = -0.38; hombro.add(codo);
    const mA = capsula(0.075, 0.22, op.piel); mA.position.y = -0.17; codo.add(mA);
    const mano = new THREE.Mesh(new THREE.SphereGeometry(0.085, 8, 8), mat(op.piel));
    mano.position.y = -0.34; mano.castShadow = true; codo.add(mano);
    p["hombro" + lado] = hombro; p["codo" + lado] = codo;
  });
  /* cuello y cabeza con rostro */
  const cuello = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.10, 0.14, 10), mat(op.piel));
  cuello.position.y = 1.96; g.add(cuello);
  const cabeza = new THREE.Mesh(new THREE.SphereGeometry(0.26, 18, 14), mat(op.piel));
  cabeza.scale.set(0.95, 1.1, 0.98); cabeza.position.y = 2.2; cabeza.castShadow = true; g.add(cabeza);
  const pelo = new THREE.Mesh(new THREE.SphereGeometry(0.275, 16, 10, 0, Math.PI * 2, 0, Math.PI / 1.75), mat(op.pelo));
  pelo.position.y = 2.23; pelo.rotation.x = -0.3; pelo.scale.set(1, 0.95, 1.05); g.add(pelo);
  [-0.09, 0.09].forEach(x => {
    const blanco = new THREE.Mesh(new THREE.SphereGeometry(0.045, 8, 8), mat(0xFFFFFF));
    blanco.position.set(x, 2.23, 0.215); g.add(blanco);
    const pupila = new THREE.Mesh(new THREE.SphereGeometry(0.022, 8, 8), mat(0x21150E));
    pupila.position.set(x, 2.23, 0.253); g.add(pupila);
    const ceja = caja(0.09, 0.022, 0.024, 0x3E2723, false); ceja.position.set(x, 2.32, 0.235); g.add(ceja);
  });
  const boca = caja(0.09, 0.024, 0.02, 0x8C5A42, false); boca.position.set(0, 2.09, 0.245); g.add(boca);
  p.cabeza = cabeza;
  return p;
}

/* ---------- Personaje REALISTA: modelo rigged con animaciones de mocap.
   Si el GLB no carga (p. ej. sin conexión), queda el humano procedural. ---------- */
let real = null, yawVis = Math.PI / 2;
const V1 = new THREE.Vector3();
new GLTFLoader().load("Soldier.glb", (gltf) => {
  try {
    const model = gltf.scene;
    model.scale.setScalar(1.15);
    model.traverse(o => { if (o.isMesh) { o.castShadow = true; o.frustumCulled = false; } });
    const mixer = new THREE.AnimationMixer(model);
    const acc = {};
    gltf.animations.forEach(cl => { acc[cl.name] = mixer.clipAction(cl); });
    if (!acc.Idle || !acc.Walk) return;
    acc.Idle.play();
    acc.Walk.play(); acc.Walk.setEffectiveWeight(0); acc.Walk.timeScale = 2.0;
    let head = null, spine = null;
    model.traverse(o => {
      if (o.isBone) {
        if (/Head$/i.test(o.name)) head = o;
        if (/Spine2$/i.test(o.name)) spine = o;
      }
    });
    if (!head || !spine) return;
    scene.add(model);
    real = { model, mixer, acc, head, spine, clips: gltf.animations, w: { Idle: 1, Walk: 0 } };
    jugador.g.visible = false;
    /* el EPP pasa a seguir los huesos del modelo real */
    [cascoJ, chalecoJ, gafasJ, orejasJ].forEach(m => {
      jugador.g.remove(m); scene.add(m); m.scale.setScalar(0.6);

const ray = new THREE.Raycaster();
const planoPiso = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
const vTmp = new THREE.Vector3();
renderer.domElement.addEventListener("pointerdown", e => {

/* ---------- Actualización ---------- */
function update(dt) {
  S.t += dt;
  if (S.inv > 0) S.inv -= dt;

  /* movimiento */
  if (autoPilot) {
    const o = objetivoActual();
    target = { x: o.x, z: o.z };
    tapRing.visible = false;
  }
  let vx = 0, vz = 0;
  if (keys["arrowleft"] || keys["a"]) vx -= 1;
  if (keys["arrowright"] || keys["d"]) vx += 1;
  if (keys["arrowup"] || keys["w"]) vz -= 1;
  if (keys["arrowdown"] || keys["s"]) vz += 1;
  if (vx || vz) {
    target = null; tapRing.visible = false;
    if (autoPilot) { autoPilot = false; setIrBtn(); }
  } else if (target) {
    const dx = target.x - S.x, dz = target.z - S.z;
    const d = Math.hypot(dx, dz);
    if (d > 0.25) { vx = dx / d; vz = dz / d; }
    else { target = null; tapRing.visible = false; }
  }
  const mag = Math.hypot(vx, vz);
  let esperando = false;
  if (mag > 0) {
    vx /= mag; vz /= mag;
    /* la guía automática se detiene ante peligros activos y espera el paso seguro */
    if (autoPilot) {
      const lx = S.x + vx * 2.2, lz = S.z + vz * 2.2;
      CAJAS.forEach(c => {
        if ((c.estado === "aviso" || c.estado === "cae") && Math.hypot(lx - c.x, lz - c.z) < 2.3) esperando = true;
      });
      if (monta.pausa <= 0 && S.x > 43 && S.x < 71 && Math.abs(lx - monta.x) < 4.8 && Math.abs(lz) < 2.6) esperando = true;
      if (!S.flags.electrico && Math.abs(lx - 108) < 2.8) esperando = true;
      if (!S.flags.cables && Math.abs(lx - 132) < 2.4) esperando = true;
      if (S.x > 136 && S.x < 164 && Math.abs(lx - carrito.x) < 3.4 && Math.abs(lz - carrito.z) < 2.2) esperando = true;
      if (!S.flags.derrame && Math.hypot(lx - 172, lz - 0.5) < 2.4) esperando = true;
    }
    if (!esperando) {
      S.x = clamp(S.x + vx * 4.6 * dt, 2, 255);
      S.z = clamp(S.z + vz * 4.6 * dt, -5, 5);
      S.yaw = Math.atan2(vx, vz);
      S.animT += dt * 10;
      S.pasoT = (S.pasoT || 0) + dt;
      if (S.pasoT > 0.34) { S.pasoT = 0; sndPaso(); }
    }
  }
  S.andando = mag > 0 && !esperando;
  S.esperando = esperando;
  /* barrera EPP */
  if (!S.epp && S.x > 12) {
    S.x = 12;
    if (target && target.x > 12) { target = null; tapRing.visible = false; }
    avisoUnaVez("gate", "La barrera no abre sin tu EPP completo. Toca el casillero azul.", 4500);
  }

  /* interacción automática */
  const it = interCercano();
  if (it && S.t > (it.cdT || 0)) {
    it.cdT = S.t + 3;
    if (target && Math.hypot(target.x - it.x, target.z - it.z) < 3) { target = null; tapRing.visible = false; }
    it.usar();
  }

  /* checkpoints monotónicos */
  [[14, 15], [42, 43], [69, 70.5], [99, 100], [110, 111.5],
   [121, 122.5], [135, 136], [163, 164.5], [175, 176.5], [230, 231]].forEach(([lim, cp]) => {
    if (S.x > lim && S.checkpoint.x < cp) S.checkpoint = { x: cp, z: 0 };
  });

  /* avisos de zona */
  if (S.x > 15 && S.x < 20) avisoUnaVez("bodega", "Zona de carga suspendida: los <strong>círculos rojos</strong> marcan dónde caen las cajas. ¡Rodéalos!");
  if (S.x > 42 && S.x < 46) avisoUnaVez("monta", "Montacargas en circulación. Pasa por el punto <strong>👀 contacto visual</strong> y cruza con el ✅.");
  if (S.x > 69 && S.x < 74) avisoUnaVez("ruido", "Adelante hay 95 dB. Toma tus <strong>protectores 🎧</strong> de la caja naranja.");
  if (S.x > 99 && S.x < 103) avisoUnaVez("electrico", "¡Cable energizado cruza el piso! No te acerques: usa el punto de <strong>reporte</strong>.");
  if (S.x > 119 && S.x < 124) avisoUnaVez("oficina", "🏢 <strong>Bienvenido al mundo oficina.</strong> Aquí los riesgos son más silenciosos: cables, pisos húmedos, malas posturas…");
  if (S.x > 124 && S.x < 127) avisoUnaVez("cablesAv", "Cables atravesados en el pasillo: organízalos en el punto ⚡ antes de pasar.");
  if (S.x > 137 && S.x < 141) avisoUnaVez("carritoAv", "📬 Pasillo concurrido: dale espacio al carrito de correspondencia.");
  if (S.x > 164 && S.x < 167) avisoUnaVez("derrameAv", "☕ Derrame de café adelante: señalízalo en el punto ⚡ antes de pasar.");
  if (S.x > 177 && S.x < 181) avisoUnaVez("pausaAv", "Llevas medio turno sin parar: una <strong>pausa activa 🤸</strong> recupera tu bienestar.");

  /* cajas que caen */
  CAJAS.forEach(c => {
    c.t += dt;
    const dur = CICLO[c.estado];
    if (c.t >= dur) {
      c.t = 0;
      c.estado = c.estado === "espera" ? "aviso" : c.estado === "aviso" ? "cae" : c.estado === "cae" ? "suelo" : "espera";
      if (c.estado === "cae") c.y = 9;
      if (c.estado === "suelo" && Math.abs(S.x - c.x) < 25) sndThud();
    }
    c.ring.visible = c.estado === "aviso" || c.estado === "cae";
    if (c.ring.visible) {
      const k = 1 + Math.sin(S.t * 8) * 0.15;
      c.ring.scale.set(k, k, 1);
    }
    if (c.estado === "cae") {
      c.y = 9 - (c.t / CICLO.cae) * 8.35;
      c.mesh.visible = true;
      c.mesh.position.set(c.x, Math.max(0.65, c.y), c.z);
      if (S.inv <= 0 && c.y < 2.6 && Math.hypot(S.x - c.x, S.z - c.z) < 1.5) leccion("caida");
    } else if (c.estado === "suelo") {
      c.mesh.visible = true;
      c.mesh.position.set(c.x, 0.65, c.z);
    } else {
      c.mesh.visible = false;
    }
  });

  /* montacargas */
  if (monta.pausa > 0) monta.pausa -= dt;
  else {
    monta.x += monta.dir * monta.vel * dt;
    if (monta.x > 68) { monta.x = 68; monta.dir = -1; }
    if (monta.x < 48) { monta.x = 48; monta.dir = 1; }
    if (Math.hypot(S.x - monta.x, S.z) < 190 / 32 && S.t - monta.beepT > 0.9 && Math.abs(S.x - monta.x) < 12) { monta.beepT = S.t; sndBeep(); }
    if (S.inv <= 0 && Math.abs(S.x - monta.x) < 2.4 && Math.abs(S.z) < 1.9 && S.x > 44 && S.x < 70) leccion("monta");
  }
  montaG.position.set(monta.x, 0, 0);
  montaG.rotation.y = monta.dir > 0 ? Math.PI / 2 : -Math.PI / 2;
  montaZona.position.set(monta.x, 0.03, 0);
  montaZona.material.color.set(monta.pausa > 0 ? 0x00795C : 0xB62233);
  montaZona.material.opacity = monta.pausa > 0 ? 0.3 : 0.22 + Math.abs(Math.sin(S.t * 5)) * 0.15;
  montaCheck.visible = monta.pausa > 0;
  montaCheck.position.set(monta.x, 4, 0);

  /* ruido */
  const enRuido = S.x > 76 && S.x < 98;
  document.getElementById("ruidoFx").style.display = (enRuido && !S.oidos) ? "block" : "none";
  if (enRuido && !S.oidos) {
    S.bien = clamp(S.bien - 3 * dt, 0, 100);
    avisoUnaVez("ruidoDolor", "¡Ese ruido daña tu audición! Devuélvete por los protectores 🎧.", 5000);
  }

  /* cable eléctrico */
  if (S.inv <= 0 && !S.flags.electrico && Math.abs(S.x - 108) < 1.5) leccion("electrico");
  chispas.forEach((ch, i) => { ch.visible = !S.flags.electrico && Math.sin(S.t * 16 + i * 2) > 0.2; });
  cableZona.material.color.set(S.flags.electrico ? 0x00795C : 0xB62233);
  cableZona.material.opacity = S.flags.electrico ? 0.3 : 0.2 + Math.abs(Math.sin(S.t * 5)) * 0.15;
  if (S.flags.electrico && !tecnico && S.t > tecnicoLlega) {
    if (real) {
      const m = SkeletonUtils.clone(real.model);
      m.traverse(o => {
        if (o.isMesh) { o.castShadow = true; o.material = o.material.clone(); o.material.color.set(0x9FB7E6); }
      });
      m.position.set(111, 0, -1.6); m.rotation.y = Math.PI / 2;
      scene.add(m);
      const mixT = new THREE.AnimationMixer(m);
      const idle = real.clips.find(c => c.name === "Idle");
      if (idle) mixT.clipAction(idle).play();
      const cascoT = cascoJ.clone(); cascoT.visible = true; cascoT.scale.setScalar(0.6);
      cascoT.position.set(111, 1.86, -1.6); scene.add(cascoT);
      tecnico = { g: m, mixer: mixT };
    } else {
      tecnico = humano({ camisa: 0x0A5CA8, piel: 0xE0AC7E, pelo: 0x21150E });
      tecnico.g.position.set(111, 0, -1.6); tecnico.g.rotation.y = -Math.PI / 2;
      const cascoT = cascoJ.clone(); cascoT.visible = true; tecnico.g.add(cascoT);
      scene.add(tecnico.g);
    }
  }

  /* --- mundo oficina --- */
  /* cables sueltos */
  if (S.inv <= 0 && !S.flags.cables && Math.abs(S.x - 132) < 1.3) leccion("cables");
  cablesZonaOf.material.color.set(S.flags.cables ? 0x00795C : 0xB62233);
  cablesZonaOf.material.opacity = S.flags.cables ? 0.3 : 0.2 + Math.abs(Math.sin(S.t * 5)) * 0.15;
  /* carrito de correspondencia */
  carrito.x += carrito.dir * carrito.vel * dt;
  if (carrito.x > 160) { carrito.x = 160; carrito.dir = -1; }
  if (carrito.x < 140) { carrito.x = 140; carrito.dir = 1; }
  if (S.inv <= 0 && S.x > 136 && S.x < 164 && Math.abs(S.x - carrito.x) < 1.7 && Math.abs(S.z - carrito.z) < 1.3) leccion("carrito");
  carritoG.position.set(carrito.x, 0, carrito.z);
  carritoG.rotation.y = carrito.dir > 0 ? Math.PI / 2 : -Math.PI / 2;
  carritoZona.position.set(carrito.x, 0.03, carrito.z);
  carritoZona.material.opacity = 0.18 + Math.abs(Math.sin(S.t * 5)) * 0.12;
  /* derrame de café */
  if (S.inv <= 0 && !S.flags.derrame && Math.hypot(S.x - 172, S.z - 0.5) < 1.35) leccion("derrame");
  derrameZona.material.color.set(S.flags.derrame ? 0x00795C : 0xB62233);
  derrameZona.material.opacity = S.flags.derrame ? 0.25 : 0.2 + Math.abs(Math.sin(S.t * 5)) * 0.15;

  /* premios de zona limpia */
  if (S.x > 164 && !S.flags.avisos.pCarrito) {
    S.flags.avisos.pCarrito = true;
    if (S.limpio.carrito) { S.puntos += 15; sndOk(); toast("Pasillo cruzado sin un solo choque. <strong>+15</strong>"); }
  }
  if (S.x > 42 && !S.flags.avisos.pBodega) {
    S.flags.avisos.pBodega = true;
    if (S.limpio.bodega) { S.puntos += 15; sndOk(); toast("Cruzaste la bodega sin un solo golpe. <strong>+15</strong>"); }
  }
  if (S.x > 70 && !S.flags.avisos.pMonta) {
    S.flags.avisos.pMonta = true;
    if (S.limpio.monta) { S.puntos += 15; sndOk(); toast("Zona de montacargas superada sin incidentes. <strong>+15</strong>"); }
  }
  if (S.x > 99 && !S.flags.avisos.pRuido) {
    S.flags.avisos.pRuido = true;
    if (S.oidos) { S.puntos += 15; sndOk(); toast("Zona de ruido cruzada con protección. <strong>+15</strong>"); }
  }

  /* evacuación (final del turno completo) */
  if (S.x > 232 && S.flags.cierre && !S.flags.alarma) {
    S.flags.alarma = true; S.flags.evacT0 = S.t;
    flechas.forEach(f => f.visible = true);
    toast("🚨 ¡Alarma de evacuación! Sigue las flechas verdes hasta el <strong>punto de encuentro</strong>. Paso firme, sin correr.", 5000);
    sndAlerta();
  }
  if (S.flags.alarma && !S.fin && Math.floor(S.t * 1.2) !== Math.floor((S.t - dt) * 1.2)) sndAlerta();
  if (S.flags.alarma && S.x > 250.5 && !S.fin) terminar();

  document.getElementById("objTxt").textContent = objetivoActual().txt;
  hud();
}

/* ---------- Animación visual (cada frame) ---------- */
function animarVisual(dt) {
  /* jugador: giro suavizado común */
  let dy = S.yaw - yawVis;
  while (dy > Math.PI) dy -= Math.PI * 2;
  while (dy < -Math.PI) dy += Math.PI * 2;
  yawVis += dy * Math.min(1, dt * 12);
  const parpadeo = S.inv > 0 && Math.sin(S.t * 18) > 0;

  if (real) {
    /* modelo realista con animaciones de mocap */
    real.model.position.set(S.x, 0, S.z);
    real.model.rotation.y = yawVis + Math.PI; /* el modelo mira hacia −Z */
    const objAnim = S.andando ? "Walk" : "Idle";
    ["Idle", "Walk"].forEach(n => {
      real.w[n] += ((n === objAnim ? 1 : 0) - real.w[n]) * Math.min(1, dt * 8);
      real.acc[n].setEffectiveWeight(real.w[n]);
    });
    real.mixer.update(dt);
    real.model.visible = !parpadeo;
    /* EPP anclado a los huesos */
    const fx = Math.sin(yawVis), fz = Math.cos(yawVis);
    real.head.getWorldPosition(V1);
    cascoJ.position.set(V1.x, V1.y + 0.10, V1.z); cascoJ.rotation.y = yawVis;
    gafasJ.position.set(V1.x + fx * 0.135, V1.y + 0.045, V1.z + fz * 0.135); gafasJ.rotation.y = yawVis;
    orejasJ.position.set(V1.x, V1.y - 1.28, V1.z); orejasJ.rotation.y = yawVis;
    real.spine.getWorldPosition(V1);
    chalecoJ.position.set(V1.x, V1.y - 0.12, V1.z); chalecoJ.rotation.y = yawVis;
  } else {
    jugador.g.position.set(S.x, 0, S.z);
    jugador.g.rotation.y = yawVis;
    /* marcha articulada procedural */
    const tA = S.animT, on = S.andando ? 1 : 0;
    jugador.musloL.rotation.x = -Math.sin(tA) * 0.62 * on;
    jugador.musloR.rotation.x = Math.sin(tA) * 0.62 * on;
    jugador.espinillaL.rotation.x = Math.max(0, Math.sin(tA - 2.1)) * 0.95 * on;
    jugador.espinillaR.rotation.x = Math.max(0, -Math.sin(tA - 2.1)) * 0.95 * on;
    jugador.hombroL.rotation.x = Math.sin(tA) * 0.48 * on;
    jugador.hombroR.rotation.x = -Math.sin(tA) * 0.48 * on;
    jugador.codoL.rotation.x = -0.28 - Math.max(0, Math.sin(tA)) * 0.3 * on;
    jugador.codoR.rotation.x = -0.28 - Math.max(0, -Math.sin(tA)) * 0.3 * on;
    jugador.g.position.y = on ? Math.abs(Math.sin(tA)) * 0.05 : 0;
    jugador.g.visible = !parpadeo;
  }
  if (tecnico && tecnico.mixer) tecnico.mixer.update(dt);
  /* barrera */
  const objRot = S.epp ? -1.25 : 0;
  barreraGrupo.rotation.x += (objRot - barreraGrupo.rotation.x) * Math.min(1, dt * 4);
  /* PREVI sigue al jugador */
  const px = S.x - Math.sin(S.yaw) * 1.6, pz = S.z - Math.cos(S.yaw) * 1.6 + 1.2;
  previ.position.x += (px - previ.position.x) * Math.min(1, dt * 3);
  previ.position.z += (pz - previ.position.z) * Math.min(1, dt * 3);
  previ.position.y = 3.1 + Math.sin(S.t * 2.4) * 0.25;
  previ.lookAt(S.x, 2, S.z);
  helice.rotation.y += dt * 18;
  /* marcadores ⚡ */
  INTER.forEach(it => {
    const on = it.activo();
    it.pad.visible = on; it.sp.visible = on;
    if (on) {
      it.sp.position.y = 1.7 + Math.sin(S.t * 4) * 0.18;
      const k = 1 + Math.sin(S.t * 4) * 0.12;
      it.pad.scale.set(k, 1, k);
    }
  });
  /* flecha de objetivo + mano tutorial */
  const obj = objetivoActual();
  const lejos = Math.hypot(obj.x - S.x, obj.z - S.z) > 3.5;
  objFlecha.visible = lejos;
  objFlecha.position.set(obj.x, 2.6 + Math.sin(S.t * 4) * 0.25, obj.z);
  mano.visible = !S.flags.avisos.primerTap && !S.pausado;
  mano.position.set(obj.x, 3.8 + Math.sin(S.t * 4) * 0.3, obj.z);
  /* huellas amarillas que marchan hacia el objetivo */
  const dxo = obj.x - S.x, dzo = obj.z - S.z, dObj = Math.hypot(dxo, dzo);
  if (dObj > 2.6 && !S.pausado) {
    const ux = dxo / dObj, uz = dzo / dObj;
    const pasoM = 1.5, off = (S.t * 2.4) % pasoM;
    MIGAS.forEach((m, i) => {
      const dd = off + 1.0 + i * pasoM;
      if (dd < dObj - 0.5) {
        m.visible = true;
        m.position.x = S.x + ux * dd;
        m.position.z = S.z + uz * dd;
        m.material.opacity = 0.85 - i * 0.07;
      } else m.visible = false;
    });
  } else MIGAS.forEach(m => { m.visible = false; });
  /* mano de alto cuando la guía espera un peligro */
  esperaSp.visible = !!S.esperando && !S.pausado;
  if (esperaSp.visible) esperaSp.position.set(S.x, 3.4 + Math.sin(S.t * 6) * 0.12, S.z);
  /* anillo del toque */
  if (tapRing.visible) {
    const k = 1 + Math.sin(S.t * 6) * 0.2;
    tapRing.scale.set(k, k, 1);
  }
  /* ondas de ruido */
  ondas.forEach(({ o, f }) => {
    const k = ((S.t * 0.8 + f * 0.33) % 1);
    o.scale.set(1 + k * 2.2, 1 + k * 2.2, 1);
    o.material.opacity = 0.85 * (1 - k);
  });
  /* alarma */
  alarma.material.color.set(S.flags.alarma && Math.sin(S.t * 8) > 0 ? 0xFF5252 : 0x7E1424);
  if (S.flags.alarma) alarma.scale.setScalar(1 + Math.abs(Math.sin(S.t * 8)) * 0.35);
  /* flechas evac */
  flechas.forEach((f, i) => { if (f.visible) f.position.y = 0.3 + Math.abs(Math.sin(S.t * 3 + i)) * 0.25; });
  /* cámara persigue */
  const cx = S.x, cz = S.z + 11.2, cy = 8.4;
  camera.position.x += (cx - camera.position.x) * Math.min(1, dt * 4);
  camera.position.y += (cy - camera.position.y) * Math.min(1, dt * 4);
  camera.position.z += (cz - camera.position.z) * Math.min(1, dt * 4);
  camera.lookAt(S.x, 1.6, S.z);
  /* luz sigue para sombras */
  sol.position.set(S.x + 14, 26, 12);
  sol.target.position.set(S.x, 0, 0);
}

/* ---------- Final ---------- */
function terminar() {
  S.fin = true; S.pausado = true;
  irBtn.style.display = "none";
  sndFanfarria();
  const evacT = S.t - S.flags.evacT0;
  S.puntos += 25;
  if (evacT < 30) { S.puntos += 10; S.flags.evacBonus = true; }
  const pct = clamp(Math.round((S.puntos / MAX) * 100), 0, 100);
  const niv = pct >= 90 ? "Líder SST" : pct >= 70 ? "Nivel Seguro" : pct >= 50 ? "Nivel Preventivo" : "Nivel Básico";
  const medallas = [
    { n: "Cero golpes", ico: "🛡️", ok: S.errores === 0 },
    { n: "Reportero en acción", ico: "📣", ok: S.reportes >= 2 },
    { n: "Evacuación ejemplar", ico: "🏃", ok: S.flags.evacBonus }
  ];
  try {
    const arr = JSON.parse(localStorage.getItem("ts_sesiones") || "[]");
    arr.unshift({ nombre: S.nombre, fecha: new Date().toLocaleString("es-CO"), modo: "Aventura 3D",
                  puntos: S.puntos, pct: pct, nivel: niv, errores: S.errores, errs: S.errs });
    localStorage.setItem("ts_sesiones", JSON.stringify(arr.slice(0, 100)));
  } catch (e) {}
  panel(
    '<div style="text-align:center;font-size:40px">🏁</div>' +
    '<h2 style="text-align:center">' + escHtml(S.nombre) + ', ¡llegaste al punto de encuentro!</h2>' +
    '<div class="res-pct">' + pct + '%</div>' +
    '<span class="nivel">' + S.puntos + ' / ' + MAX + ' pts · ' + niv + ' · Bienestar ' + Math.round(S.bien) + '%</span>' +
    '<div class="medallas">' +
    medallas.map(m => '<div class="medalla ' + (m.ok ? "" : "off") + '"><span class="ico">' + m.ico + '</span>' + m.n + '</div>').join("") +
    '</div>' +
    (S.errores ? '<div class="exp"><strong>PREVI:</strong> Tuviste ' + S.errores + ' incidente(s). En el modo clásico puedes repasar esos riesgos con calma.</div>'
               : '<div class="exp"><strong>PREVI:</strong> Turno impecable: ni un solo incidente. Así se ve la cultura preventiva en acción. 🏆</div>') +
    '<button class="btn" id="btnOtra">Jugar de nuevo</button>' +
    '<button class="btn sec" id="btnMenu">Volver al menú</button>', "ok");
  document.getElementById("btnOtra").onclick = () => location.reload();
  document.getElementById("btnMenu").onclick = () => location.href = "index.html";
  if (pct >= 70) confeti();
  sndOk();
}
function escHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function confeti() {
  const c = document.createElement("div"); c.className = "confetti";
  const cols = ["#00795C","#F2B705","#0A5CA8","#E57373","#FFD54F"];
  for (let i = 0; i < 70; i++) {
    const p = document.createElement("i");
    p.style.left = Math.random() * 100 + "%";
    p.style.background = cols[i % cols.length];
    p.style.animationDuration = (2.2 + Math.random() * 2) + "s";
    p.style.animationDelay = (Math.random() * 0.8) + "s";
    c.appendChild(p);
  }
  stage.appendChild(c);
  setTimeout(() => c.remove(), 5500);
}

/* ---------- Bucle ---------- */
let tPrev = performance.now();
function loop(t) {
  const dt = clamp((t - tPrev) / 1000, 0, 0.05);
  tPrev = t;
  if (!S.pausado && !S.fin) update(dt);
  animarVisual(dt);
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}

/* ---------- Intro ---------- */
function intro() {
  panel(
    '<div style="text-align:center;font-size:44px">👷</div>' +
    '<h2 style="text-align:center">Turno Seguro 3D · Planta + Oficina</h2>' +
    '<p style="font-size:14.5px;text-align:center;margin:4px 0 10px">Un turno completo en 3D: primero la planta (EPP, cargas, montacargas, ruido, riesgo eléctrico) y luego la oficina (cables, pisos húmedos, pausas activas, ergonomía) hasta evacuar al punto de encuentro. Tu objetivo siempre está arriba 🎯.</p>' +
    '<div class="ctl-demo">' +
    '<div class="k" style="border-color:var(--green)">👣<small><strong>Pulsa el botón verde de abajo</strong><br>y el personaje camina solo,<br>esperando ante cada peligro ✋</small></div>' +
    '<div class="k">👆<small>o toca el piso<br>a donde quieras ir</small></div>' +
    '</div>' +
    '<p style="font-size:13px;text-align:center;color:var(--muted);margin:2px 0 8px">Sigue las huellas amarillas. En los puntos verdes ⚡ el personaje actúa automáticamente. Rojo en el piso = peligro; verde = seguro.</p>' +
    '<input type="text" id="nombre" maxlength="40" placeholder="Tu nombre" autocomplete="off">' +
    '<button class="btn" id="btnGo">▶ Iniciar el turno</button>' +
    '<button class="btn sec" id="btnVolver">Volver al menú</button>');
  document.getElementById("btnGo").onclick = empezar;
  document.getElementById("btnVolver").onclick = () => location.href = "index.html";
}
function empezar() {
  const n = document.getElementById("nombre").value.trim();
  S.nombre = n || "Jugador(a)";
  cerrarPanel();
  iniciarAudioFondo();
  setIrBtn();
  toast("¡Buen turno, " + escHtml(S.nombre) + "! Pulsa el botón verde <strong>👣 Ir al objetivo</strong> de abajo y yo te guío paso a paso.", 6000);
}

window.AV = { S, update, monta, CAJAS, leccion, terminar, objetivoActual,
              renderOnce: () => renderer.render(scene, camera),
              animar: (dt) => animarVisual(dt),
              getTarget: () => target, setTarget: (x, z) => { target = { x, z }; },
              getReal: () => real,
              getAuto: () => autoPilot, setAuto: (v) => { autoPilot = v; setIrBtn(); },
              empezar, togKit, confKit, abrirKit };

intro();
requestAnimationFrame(loop);
</script>
