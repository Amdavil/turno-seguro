<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Turno Seguro — Misión: cero accidentes</title>
<style>
  :root {
    --bg: #ECEFEA;
    --surface: #FFFFFF;
    --ink: #1F262A;
    --muted: #5B6871;
    --line: #D5DCD3;
    --green: #00795C;
    --green-hi: #009B76;
    --green-deep: #00503B;
    --green-soft: #DFF0E8;
    --yellow: #F2B705;
    --yellow-ink: #8A6200;
    --yellow-soft: #FBF0D0;
    --red: #B62233;
    --red-hi: #D53A4C;
    --red-deep: #7E1424;
    --red-soft: #FADDE0;
    --blue: #0A5CA8;
    --blue-hi: #1272C6;
    --blue-deep: #063E70;
    --blue-soft: #E0EDF9;
    --shadow-card: 0 10px 28px rgba(31,38,42,0.10), 0 2px 6px rgba(31,38,42,0.06);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; }
  body {
    background:
      radial-gradient(900px 420px at 50% -120px, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 60%),
      linear-gradient(165deg, #F1F5EF 0%, #DCE4DB 55%, #D3DCD3 100%);
    background-attachment: fixed;
    color: var(--ink);
    font-family: "Segoe UI", -apple-system, Roboto, sans-serif;
    line-height: 1.5;
    min-height: 100vh;
  }
  #app { max-width: 540px; margin: 0 auto; padding: 14px 14px 48px; }
  #app > * { animation: fadeUp 0.45s cubic-bezier(0.2, 0.8, 0.3, 1) both; }
  #app > *:nth-child(2) { animation-delay: 0.05s; }
  #app > *:nth-child(3) { animation-delay: 0.1s; }
  #app > *:nth-child(4) { animation-delay: 0.15s; }
  #app > *:nth-child(5) { animation-delay: 0.2s; }
  #app > *:nth-child(6) { animation-delay: 0.25s; }
  #app > *:nth-child(7) { animation-delay: 0.3s; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
  .hazard {
    height: 10px;
    background: repeating-linear-gradient(-45deg, var(--yellow) 0 14px, #23272B 14px 28px);
    box-shadow: 0 2px 8px rgba(31,38,42,0.25);
    position: relative; z-index: 30;
  }

  /* ---------- Genéricos ---------- */
  .btn {
    display: block; width: 100%; border: none; cursor: pointer;
    background: linear-gradient(180deg, var(--green-hi), var(--green));
    color: #fff; font-weight: 800; letter-spacing: 0.01em;
    font-size: 17px; padding: 14px 18px; border-radius: 14px;
    font-family: inherit; margin: 10px 0;
    box-shadow: 0 4px 0 var(--green-deep), 0 8px 18px rgba(31,38,42,0.18);
    transition: transform 0.08s ease, box-shadow 0.08s ease, filter 0.15s;
    text-shadow: 0 1px 2px rgba(0,0,0,0.2);
  }
  .btn:hover { filter: brightness(1.05); }
  .btn:active { transform: translateY(4px); box-shadow: 0 0 0 var(--green-deep), 0 2px 6px rgba(31,38,42,0.2); }
  .btn.blue {
    background: linear-gradient(180deg, var(--blue-hi), var(--blue));
    box-shadow: 0 4px 0 var(--blue-deep), 0 8px 18px rgba(31,38,42,0.18);
  }
  .btn.blue:active { box-shadow: 0 0 0 var(--blue-deep), 0 2px 6px rgba(31,38,42,0.2); }
  .btn.sec {
    background: var(--surface); color: var(--ink); border: 2px solid var(--line);
    box-shadow: 0 3px 0 var(--line), 0 6px 14px rgba(31,38,42,0.08);
    text-shadow: none; font-weight: 700;
  }
  .btn.sec:active { box-shadow: 0 0 0 var(--line); transform: translateY(3px); }
  .card {
    background: var(--surface); border: 1px solid rgba(31,38,42,0.06);
    border-radius: 16px; padding: 18px 20px; margin: 14px 0;
    box-shadow: var(--shadow-card);
  }
  .tag { display:inline-block; font-size:12px; font-weight:700; padding:3px 10px; border-radius:6px; }
  .tag.g { background: var(--green-soft); color: var(--green); }
  .tag.y { background: var(--yellow-soft); color: var(--yellow-ink); }
  .tag.r { background: var(--red-soft); color: var(--red); }
  .tag.b { background: var(--blue-soft); color: var(--blue); }

  /* ---------- Portada ---------- */
  .home { text-align: center; padding-top: 30px; position: relative; }
  .home .logo { font-size: 54px; line-height: 1; }
  .home .logo svg, .home .logo span { filter: drop-shadow(0 10px 22px rgba(0,121,92,0.35)); }
  .home h1 {
    font-size: clamp(42px, 11vw, 52px); font-weight: 900; letter-spacing: -0.03em;
    margin: 12px 0 2px; text-shadow: 0 2px 0 #fff, 0 10px 24px rgba(31,38,42,0.15);
  }
  .home h1 .dot { color: var(--green); }
  .mini-hazard {
    width: 130px; height: 7px; margin: 10px auto 14px; border-radius: 4px;
    background: repeating-linear-gradient(-45deg, var(--yellow) 0 9px, #23272B 9px 18px);
  }
  .home .tagline { color: var(--muted); margin: 0 0 24px; font-size: 16.5px; }
  .brand { font-size: 12px; color: var(--muted); margin-top: 20px; }
  .empresa-nombre { font-size: 14px; font-weight: 700; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin: 2px 0 0; }
  .hero-icons { position: absolute; inset: 0; pointer-events: none; z-index: -1; }
  .hero-icons span { position: absolute; font-size: 26px; opacity: 0.35; animation: floaty 4.5s ease-in-out infinite; }
  .hero-icons span:nth-child(1) { top: 12px; left: 6%; animation-delay: 0s; }
  .hero-icons span:nth-child(2) { top: 80px; right: 5%; animation-delay: 0.7s; }
  .hero-icons span:nth-child(3) { top: 190px; left: 3%; animation-delay: 1.4s; font-size: 22px; }
  .hero-icons span:nth-child(4) { top: 10px; right: 14%; animation-delay: 2.1s; font-size: 22px; }
  .hero-icons span:nth-child(5) { top: 150px; right: 2%; animation-delay: 2.8s; }
  .hero-icons span:nth-child(6) { top: 110px; left: 10%; animation-delay: 3.5s; font-size: 20px; }
  @keyframes floaty { 0%,100% { transform: translateY(0) rotate(-4deg); } 50% { transform: translateY(-12px) rotate(5deg); } }

  /* ---------- HUD ---------- */
  .hud {
    display: flex; align-items: center; gap: 10px;
    background: rgba(255,255,255,0.86); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(31,38,42,0.08);
    border-radius: 14px; padding: 9px 13px; margin-bottom: 10px;
    font-size: 14px; font-weight: 600;
    position: sticky; top: 10px; z-index: 20;
    box-shadow: 0 8px 20px rgba(31,38,42,0.12);
  }
  .hud .avatar { font-size: 24px; filter: drop-shadow(0 2px 3px rgba(31,38,42,0.25)); }
  .hud .pts { color: var(--green); font-size: 18px; font-weight: 800; white-space: nowrap; font-variant-numeric: tabular-nums; }
  .hud .bien { flex: 1; }
  .hud .bien .label { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.09em; color: var(--muted); }
  .bar { height: 12px; background: rgba(31,38,42,0.1); border-radius: 8px; overflow: hidden; box-shadow: inset 0 1px 3px rgba(31,38,42,0.15); }
  .bar > div {
    height: 100%; border-radius: 8px;
    background: linear-gradient(180deg, var(--green-hi), var(--green));
    transition: width 0.5s cubic-bezier(0.3, 1.2, 0.4, 1);
  }
  .bar.warn > div { background: linear-gradient(180deg, #FFCB2E, var(--yellow)); }
  .bar.low > div { background: linear-gradient(180deg, var(--red-hi), var(--red)); animation: pulseBar 1s ease-in-out infinite; }
  @keyframes pulseBar { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }
  .hud .icobtn { background: none; border: none; font-size: 19px; cursor: pointer; padding: 2px; transition: transform 0.15s; }
  .hud .icobtn:hover { transform: scale(1.2); }
  .progress { font-size: 12.5px; color: var(--muted); margin: 0 2px 8px; display: flex; justify-content: space-between; font-weight: 600; }
  .racha { color: var(--yellow-ink); font-weight: 800; animation: pulseBar 1.2s ease-in-out infinite; }

  /* ---------- Escena ---------- */
  .zona { font-size: 12px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin: 6px 2px 8px; }
  .scene-wrap {
    border-radius: 16px; overflow: hidden; background: #fff;
    border: 1px solid rgba(31,38,42,0.08);
    box-shadow: var(--shadow-card);
    transition: filter 0.3s;
  }
  .scene-wrap svg { display: block; width: 100%; height: auto; }
  .scene-wrap.frozen { filter: grayscale(1) contrast(1.15); }
  .scene-wrap.blur { filter: blur(3px) saturate(0.7); }
  .scene-wrap.shake { animation: shake 0.5s both; }
  @keyframes shake {
    10%, 90% { transform: translateX(-2px); }
    20%, 80% { transform: translateX(4px); }
    30%, 50%, 70% { transform: translateX(-6px); }
    40%, 60% { transform: translateX(6px); }
  }
  .previ-row { display: flex; gap: 10px; align-items: flex-start; margin: 14px 0; }
  .previ-bot { flex: 0 0 54px; animation: float 2.6s ease-in-out infinite; filter: drop-shadow(0 6px 10px rgba(31,38,42,0.25)); }
  @keyframes float { 0%,100% { transform: translateY(0);} 50% { transform: translateY(-6px);} }
  .bubble {
    background: linear-gradient(180deg, #FFFFFF, var(--blue-soft));
    border: 1px solid rgba(10,92,168,0.15);
    border-radius: 14px; border-top-left-radius: 4px;
    padding: 11px 15px; font-size: 15px; flex: 1;
    box-shadow: 0 4px 12px rgba(31,38,42,0.08);
  }
  .bubble strong { color: var(--blue); }
  .dec {
    display: flex; align-items: center; gap: 12px; width: 100%; text-align: left; cursor: pointer;
    background: var(--surface); border: 2px solid var(--line); border-radius: 14px;
    padding: 12px 14px; margin: 9px 0; font-size: 15.5px; font-family: inherit; color: var(--ink);
    box-shadow: 0 3px 0 var(--line), 0 5px 12px rgba(31,38,42,0.06);
    transition: transform 0.1s, border-color 0.15s, box-shadow 0.1s;
  }
  .dec:hover { border-color: var(--green); }
  .dec:hover .letra { background: var(--green); color: #fff; }
  .dec:active { transform: translateY(3px); box-shadow: 0 0 0 var(--line); border-color: var(--green); }
  .dec .letra {
    flex: 0 0 30px; height: 30px; border-radius: 50%;
    background: var(--line); color: var(--ink);
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 14px; transition: background 0.15s, color 0.15s;
  }

  /* ---------- Efectos SVG ---------- */
  @keyframes flicker { from { opacity: 1; } to { opacity: 0.15; } }
  svg .fx-flicker { animation: flicker 0.45s ease-in-out infinite alternate; }
  @keyframes wavepulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
  svg .fx-wave1 { animation: wavepulse 1.6s ease-in-out infinite; }
  svg .fx-wave2 { animation: wavepulse 1.6s ease-in-out 0.4s infinite; }
  svg .fx-wave3 { animation: wavepulse 1.6s ease-in-out 0.8s infinite; }
  @keyframes alarmblink { 0%, 100% { opacity: 1; } 50% { opacity: 0.15; } }
  svg .fx-alarm { animation: alarmblink 0.9s steps(2) infinite; }
  @keyframes steam { 0% { transform: translateY(0); opacity: 0.8; } 100% { transform: translateY(-7px); opacity: 0; } }
  svg .fx-steam { transform-box: fill-box; animation: steam 2s ease-out infinite; }
  @keyframes helice { 0% { transform: scaleX(1); } 50% { transform: scaleX(0.15); } 100% { transform: scaleX(1); } }
  svg .fx-helice { transform-box: fill-box; transform-origin: center; animation: helice 0.5s linear infinite; }

  /* ---------- Flash de peligro ---------- */
  .flash {
    position: fixed; inset: 0; pointer-events: none; z-index: 90;
    background: radial-gradient(ellipse at center, rgba(182,34,51,0) 35%, rgba(182,34,51,0.4) 100%);
    animation: flashOut 0.8s ease-out forwards;
  }
  @keyframes flashOut { 0% { opacity: 1; } 100% { opacity: 0; } }

  /* ---------- Confeti ---------- */
  .confetti { position: fixed; inset: 0; pointer-events: none; z-index: 95; overflow: hidden; }
  .confetti i {
    position: absolute; top: -16px; width: 10px; height: 15px; border-radius: 2px; opacity: 0.95;
    animation-name: confettiFall; animation-timing-function: linear; animation-fill-mode: forwards;
  }
  @keyframes confettiFall { to { transform: translateY(108vh) rotate(680deg); opacity: 0.7; } }

  /* ---------- Mapa ---------- */
  .mapa-mundo { margin: 14px 0 6px; font-weight: 800; font-size: 15px; letter-spacing: 0.02em; }
  .mapa-item {
    display: flex; align-items: center; gap: 10px; padding: 8px 12px;
    border-radius: 10px; font-size: 14.5px; border-left: 3px solid transparent;
  }
  .mapa-item.done { color: var(--green); border-left-color: var(--green); }
  .mapa-item.actual {
    background: var(--green-soft); font-weight: 800; border-left-color: var(--green);
    box-shadow: 0 3px 10px rgba(0,121,92,0.15);
  }
  .mapa-item.lock { color: var(--muted); opacity: 0.65; }

  /* ---------- Overlays ---------- */
  .overlay {
    position: fixed; inset: 0; background: rgba(16,22,20,0.6);
    backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
    display: flex; align-items: center; justify-content: center; padding: 18px; z-index: 50;
    animation: overlayIn 0.2s ease both;
  }
  @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--surface); border-radius: 20px; padding: 24px;
    max-width: 460px; width: 100%; max-height: 88vh; overflow-y: auto;
    box-shadow: 0 24px 60px rgba(0,0,0,0.35);
    animation: modalIn 0.32s cubic-bezier(0.2, 1.4, 0.4, 1) both;
  }
  @keyframes modalIn { from { opacity: 0; transform: scale(0.85) translateY(18px); } to { opacity: 1; transform: none; } }
  .modal.ok { border-top: 8px solid var(--green); }
  .modal.bad { border-top: 8px solid var(--red); }
  .modal.info { border-top: 8px solid var(--blue); }
  .modal.regla { border-top: 8px solid var(--yellow); }
  .modal h2 { margin: 0 0 8px; font-size: 22px; font-weight: 800; }
  .modal h2.alerta { color: var(--red); }
  .modal h2.bien { color: var(--green); }
  .delta { font-size: 34px; font-weight: 900; margin: 8px 0; animation: deltaPop 0.4s cubic-bezier(0.2, 1.6, 0.4, 1) 0.15s both; font-variant-numeric: tabular-nums; }
  @keyframes deltaPop { from { opacity: 0; transform: scale(0.4); } to { opacity: 1; transform: scale(1); } }
  .delta.up { color: var(--green); }
  .delta.down { color: var(--red); }
  .exp {
    background: var(--blue-soft); border-left: 4px solid var(--blue);
    border-radius: 10px; padding: 11px 15px; font-size: 14.5px; margin: 14px 0;
  }
  .exp strong { color: var(--blue); }
  .regla-txt { font-size: 20px; font-weight: 800; text-align: center; padding: 12px 4px; }

  /* ---------- Kit / quiz ---------- */
  .kit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 14px 0; }
  .kit-item {
    border: 2px solid var(--line); background: var(--surface); border-radius: 14px;
    padding: 12px 8px; text-align: center; cursor: pointer; font-family: inherit; font-size: 14px; color: var(--ink);
    box-shadow: 0 3px 0 var(--line);
    transition: transform 0.12s, border-color 0.15s, box-shadow 0.12s;
  }
  .kit-item:hover { transform: translateY(-2px); }
  .kit-item:active { transform: translateY(2px); box-shadow: 0 0 0 var(--line); }
  .kit-item .ico { font-size: 30px; display: block; filter: drop-shadow(0 3px 4px rgba(31,38,42,0.2)); }
  .kit-item.sel { border-color: var(--green); background: var(--green-soft); box-shadow: 0 3px 0 var(--green); }
  .kit-item.correcto { border-color: var(--green); background: var(--green-soft); }
  .kit-item.errado { border-color: var(--red); background: var(--red-soft); animation: shake 0.4s both; }

  /* ---------- Resultados ---------- */
  .res-head { text-align: center; padding: 10px 0 4px; }
  .res-pct {
    font-size: 62px; font-weight: 900; line-height: 1.05; letter-spacing: -0.03em;
    background: linear-gradient(120deg, var(--green), var(--blue));
    -webkit-background-clip: text; background-clip: text; color: transparent;
    font-variant-numeric: tabular-nums;
  }
  .nivel { display: inline-block; font-size: 16px; font-weight: 800; padding: 8px 18px; border-radius: 10px; margin: 10px 0 2px; }
  .badges { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .badge {
    border: 1px solid var(--line); border-radius: 14px; padding: 12px 8px;
    text-align: center; font-size: 13px; font-weight: 700;
    animation: badgeIn 0.45s cubic-bezier(0.2, 1.5, 0.4, 1) both;
  }
  @keyframes badgeIn { from { opacity: 0; transform: scale(0.6); } to { opacity: 1; transform: scale(1); } }
  .badge .ico { font-size: 30px; display: block; filter: drop-shadow(0 3px 5px rgba(31,38,42,0.25)); }
  .badge:not(.off) {
    background: linear-gradient(160deg, #FFFBEE, #FFF0C2);
    border-color: #E8C766;
    box-shadow: 0 6px 16px rgba(232,183,5,0.25);
  }
  .badge.off { opacity: 0.35; filter: grayscale(1); }
  table.hist { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  table.hist th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); padding: 6px 8px; border-bottom: 2px solid var(--line); }
  table.hist td { padding: 7px 8px; border-bottom: 1px solid var(--line); }

  input[type=text] {
    width: 100%; font-size: 17px; padding: 13px 15px; border-radius: 12px;
    border: 2px solid var(--line); font-family: inherit; margin: 6px 0 14px;
    background: var(--surface); color: var(--ink);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  input[type=text]:focus { outline: none; border-color: var(--green); box-shadow: 0 0 0 4px var(--green-soft); }
  .avatars { display: flex; gap: 10px; justify-content: center; margin: 8px 0 18px; }
  .avatars button {
    font-size: 36px; background: var(--surface); border: 3px solid var(--line);
    border-radius: 14px; padding: 8px 12px; cursor: pointer;
    box-shadow: 0 3px 0 var(--line);
    transition: transform 0.12s, border-color 0.15s;
  }
  .avatars button:hover { transform: translateY(-3px); }
  .avatars button.sel { border-color: var(--green); background: var(--green-soft); box-shadow: 0 3px 0 var(--green); transform: scale(1.06); }

  @media (prefers-reduced-motion: reduce) {
    *, svg * { animation: none !important; transition: none !important; }
  }

  /* ---------- Constancia (solo impresión) ---------- */
  #cert { display: none; }
  @media print {
    body > *:not(#cert) { display: none !important; }
    #cert { display: block; font-family: Georgia, serif; padding: 60px 50px; text-align: center; }
    #cert .marco { border: 4px double #00795C; padding: 50px 40px; }
    #cert h1 { letter-spacing: 0.05em; }
    #cert .nombre { font-size: 30px; font-weight: 700; margin: 18px 0; }
    #cert .datos { margin-top: 26px; font-size: 15px; line-height: 2; }
  }
</style>
</head>
<body>
<div class="hazard"></div>
<div id="app"></div>
<div id="cert"></div>

<script>
"use strict";
/* =====================================================================
   TURNO SEGURO — prototipo MVP completo
   Motor de escenas dirigido por datos: todo el contenido vive en PACK.
   Personalización por empresa: edita PACK.empresa (nombre, color, logo).
   Agregar un escenario = agregar un objeto a PACK.escenarios.
   ===================================================================== */

/* ---------- Arte SVG ---------- */
function persona(x, y, opts) {
  opts = opts || {};
  const piel = "#D9A066";
  const traje = opts.oficina ? "#546E7A" : "#1565C0";
  let s = '<g transform="translate(' + x + ',' + y + ')' + (opts.rot ? ' rotate(' + opts.rot + ')' : '') + '">';
  s += '<ellipse cx="0" cy="79" rx="22" ry="5" fill="rgba(31,38,42,0.18)"/>';
  s += '<rect x="-11" y="46" width="9" height="26" rx="3" fill="#37474F"/>';
  s += '<rect x="2" y="46" width="9" height="26" rx="3" fill="#37474F"/>';
  s += '<rect x="-13" y="70" width="12" height="6" rx="2" fill="#212121"/><rect x="1" y="70" width="12" height="6" rx="2" fill="#212121"/>';
  s += '<rect x="-14" y="12" width="28" height="38" rx="6" fill="' + traje + '"/>';
  if (opts.chaleco) s += '<rect x="-14" y="12" width="28" height="26" rx="6" fill="#F57F17"/><rect x="-14" y="20" width="28" height="4" fill="#FFF59D"/>';
  s += '<rect x="-20" y="14" width="7" height="24" rx="3.5" fill="' + traje + '"/><rect x="13" y="14" width="7" height="24" rx="3.5" fill="' + traje + '"/>';
  s += '<circle cx="0" cy="0" r="13" fill="' + piel + '"/>';
  s += '<circle cx="-4" cy="-2" r="1.6" fill="#212121"/><circle cx="4" cy="-2" r="1.6" fill="#212121"/>';
  s += opts.susto ? '<circle cx="0" cy="6" r="2.5" fill="#212121"/>' : '<path d="M -4 5 Q 0 8 4 5" stroke="#212121" stroke-width="1.5" fill="none" stroke-linecap="round"/>';
  if (opts.casco) {
    s += '<path d="M -13 -6 A 13 13 0 0 1 13 -6 L 15 -4 L -15 -4 Z" fill="#F2B705" stroke="#C99700" stroke-width="1"/>' +
      '<path d="M -9 -9 A 10 10 0 0 1 -1 -12" stroke="#FFF176" stroke-width="2" fill="none" stroke-linecap="round"/>';
  } else {
    s += '<path d="M -12.5 -3 A 12.5 12.5 0 0 1 12.5 -3 L 12.5 0 Q 0 -8 -12.5 0 Z" fill="#4E342E"/>';
  }
  s += '</g>';

function resetState(modo) {
  modo = modo || "completo";
  const plan = [];
  PACK.escenarios.forEach(function (e, i) { if (MODOS[modo].filtro(e)) plan.push(i); });
  S = { nombre: "", avatar: "👷", modo: modo, plan: plan, pos: 0,
        puntos: 0, bien: 100, racha: 0,
        errores: {}, totalErrores: 0, reportes: 0,
        kitPerfecto: false, kitHecho: false, quizFallos: [], max: 0 };
  S.max = plan.reduce(function (acc, i) {
    const e = PACK.escenarios[i];
    let m = Math.max.apply(null, e.decisiones.map(function (d) { return d.pts; }));
    if (e.kit) m += 15;
    if (e.quiz) m += e.quiz.pts;
    return acc + m;
  }, 0);
}

/* ---------- Branding por empresa ---------- */
function shade(hex, f) {
  /* f > 0 aclara hacia blanco, f < 0 oscurece hacia negro */
  const n = hex.replace("#", "");
  const partes = n.length === 3
    ? n.split("").map(function (c) { return c + c; })
    : [n.slice(0, 2), n.slice(2, 4), n.slice(4, 6)];
  return "#" + partes.map(function (h) {
    let v = parseInt(h, 16);
    v = f < 0 ? Math.round(v * (1 + f)) : Math.round(v + (255 - v) * f);
    return ("0" + Math.max(0, Math.min(255, v)).toString(16)).slice(-2);
  }).join("");
}
function applyBrand() {
  try {
    const guardada = JSON.parse(localStorage.getItem("ts_empresa") || "null");
    if (guardada) Object.assign(PACK.empresa, guardada);
  } catch (e) { /* config corrupta: se ignora */ }
  const c = PACK.empresa.color;
  if (c && /^#[0-9a-fA-F]{3,6}$/.test(c)) {
    const r = document.documentElement.style;
    r.setProperty("--green", c);
    r.setProperty("--green-hi", shade(c, 0.18));
    r.setProperty("--green-deep", shade(c, -0.38));
    r.setProperty("--green-soft", shade(c, 0.88));
  }
}

/* ---------- Audio ---------- */
let audioCtx = null, muted = false;
function tone(seq) {
  if (muted) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let t = audioCtx.currentTime;
    seq.forEach(function (p) {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = p.w || "sine"; o.frequency.value = p.f;
      g.gain.setValueAtTime(0.12, t); g.gain.exponentialRampToValueAtTime(0.001, t + p.d);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(t); o.stop(t + p.d); t += p.d * 0.85;
    });
  } catch (e) { /* sin audio */ }
}
const sndOk = function () { tone([{ f: 523, d: 0.12 }, { f: 784, d: 0.2 }]); };
const sndBad = function () { tone([{ f: 330, d: 0.15 }, { f: 196, d: 0.3 }]); };
const sndAlert = function () { tone([{ f: 880, d: 0.1, w: "square" }, { f: 880, d: 0.1, w: "square" }]); };
const sndBadge = function () { tone([{ f: 523, d: 0.1 }, { f: 659, d: 0.1 }, { f: 1047, d: 0.25 }]); };

}

function mapaHTML() {
  let html = "", mundoPrev = "";
  S.plan.forEach(function (idx, p) {
    const e = PACK.escenarios[idx];
    if (e.mundo !== mundoPrev) {
      mundoPrev = e.mundo;
      html += '<div class="mapa-mundo">' + (e.mundo === "operativo" ? "🏭 Mundo Operativo" : "💼 Mundo Oficina") + '</div>';
    }
    const estado = p < S.pos ? "done" : (p === S.pos ? "actual" : "lock");
    const ico = p < S.pos ? "✅" : (p === S.pos ? "▶️" : "🔒");
    html += '<div class="mapa-item ' + estado + '"><span>' + ico + '</span><span>' + e.titulo + '</span></div>';
  });
  return html;
}

  document.querySelectorAll(".avatars button").forEach(function (b) { b.classList.remove("sel"); });
  btn.classList.add("sel");
}
function startGame() {
  const n = document.getElementById("nombre").value.trim();
  S.nombre = n || "Jugador(a)";
  renderMapa();
}
function renderMapa() {
  app.innerHTML =
    '<div class="card" style="border-top:8px solid var(--yellow)">' +
    '<h2 style="margin-top:0">🗺️ Mapa del turno de ' + esc(S.nombre) + '</h2>' +
    mapaHTML() +
    '<button class="btn" onclick="renderScene()">Comenzar el turno</button>' +
    '</div>';
  window.scrollTo(0, 0);
}

function renderScene() {
  const e = escActual();
  app.innerHTML = hud() +
    '<div class="zona">' + e.zona + '</div>' +
    '<div class="scene-wrap" id="sceneWrap">' + e.escena(false) + '</div>' +
    '<div class="previ-row"><div class="previ-bot">' + previSVG() + '</div>' +
    '<div class="bubble"><strong>PREVI:</strong> ' + e.previ + '</div></div>' +
    '<div class="decs">' +
    e.decisiones.map(function (d, i) {
      return '<button class="dec" onclick="decidir(' + i + ')"><span class="letra">' + letras[i] + '</span><span>' + d.t + '</span></button>';
    }).join("") +
    '</div>';
  window.scrollTo(0, 0);
}

function decidir(i) {
  const e = escActual();
  const d = e.decisiones[i];
  if (d.tipo.indexOf("insegura") === 0) {
    S.errores[e.id] = (S.errores[e.id] || 0) + 1;
    S.totalErrores++;
    S.racha = 0;
    S.puntos += d.pts;
    S.bien = clamp(S.bien + d.bien);
    const w = document.getElementById("sceneWrap");
    if (d.tipo === "insegura_grave") {
      w.innerHTML = e.escena(true);
      w.classList.add("frozen");
    } else if (d.efecto === "blur") {
      w.classList.add("blur");
    }
    w.classList.add("shake");
    const fl = document.createElement("div");
    fl.className = "flash";
    document.body.appendChild(fl);
    setTimeout(function () { fl.remove(); }, 850);
    sndAlert(); setTimeout(sndBad, 250);
    showModal("bad",
      '<h2 class="alerta">⚠️ Alerta de seguridad</h2>' +
      '<p style="font-weight:600">' + d.alerta + '</p>' +
      '<div class="delta down">' + d.pts + ' pts &nbsp;·&nbsp; bienestar ' + d.bien + '%</div>' +
      '<div class="exp"><strong>PREVI:</strong> ' + d.exp + '</div>' +
      '<button class="btn" onclick="closeModal();renderScene()">Reintentar la escena</button>');
  } else {
    let extra = 0;
    S.racha++;
    if (S.racha >= 3) extra = 5;
    S.puntos += d.pts + extra;
    S.bien = clamp(S.bien + (d.bienMas || 5));
    if (d.reporte) S.reportes++;
    sndOk();
    showModal("ok",
      '<h2 class="bien">✅ ¡Decisión segura!</h2>' +
      '<div class="delta up">+' + (d.pts + extra) + ' pts' + (extra ? ' <span style="font-size:15px">(🔥 racha +5)</span>' : '') + '</div>' +
      '<div class="exp"><strong>PREVI:</strong> ' + d.fb + '</div>' +
      '<button class="btn" onclick="closeModal();afterSafe()">Continuar</button>');
  }
}

function afterSafe() {
  const e = escActual();
  if (e.kit && !S.kitHecho) { renderKit(); return; }
  showRegla();
}

function showRegla() {
  const e = escActual();
  showModal("regla",
    '<h2>📌 Regla de bolsillo</h2>' +
    '<p class="regla-txt">“' + e.regla + '”</p>' +
    '<button class="btn" onclick="closeModal();' + (e.quiz ? 'renderQuiz()' : 'advance()') + '">' +
    (e.quiz ? 'Pregunta rápida →' : (S.pos + 1 < S.plan.length ? 'Siguiente escena →' : 'Ver mis resultados →')) + '</button>');
}

function advance() {
  const anterior = escActual();
  S.pos++;
  if (S.pos >= S.plan.length) { renderResults(); return; }
  const sig = escActual();
  if (sig.mundo !== anterior.mundo) { renderTransicion(); return; }
  renderScene();
}

function renderTransicion() {
  app.innerHTML =
    '<div class="card" style="border-top:8px solid var(--blue);text-align:center">' +
    '<div style="font-size:50px">🧥</div>' +
    '<h2>Cambio de mundo</h2>' +
    '<p>Terminaste la parte operativa del turno. Te cambias de ropa y pasas al mundo administrativo…<br><em>Spoiler: la oficina también tiene riesgos.</em></p>' +
    '<div class="previ-row" style="text-align:left"><div class="previ-bot">' + previSVG() + '</div>' +
    '<div class="bubble"><strong>PREVI:</strong> Aquí no hay montacargas, pero tu espalda, tus ojos y tu energía siguen en juego. ¡Vamos!</div></div>' +
    mapaHTML() +
    '<button class="btn" onclick="renderScene()">Entrar a la oficina</button>' +
    '</div>';
  window.scrollTo(0, 0);
}

/* ---------- Mini-reto: arma tu kit ---------- */
let kitSel = [];
function renderKit() {
  kitSel = [];
  app.innerHTML = hud() +
    '<div class="card" style="border-top:8px solid var(--yellow)">' +
    '<h2 style="margin-top:0">🧰 Mini-reto: arma tu kit</h2>' +
    '<p>La señal exige <strong>5 elementos</strong> para esta zona. Toca los correctos:</p>' +
    '<div class="kit-grid">' +
    PACK.kitItems.map(function (k, i) {
      return '<button class="kit-item" id="ki' + i + '" onclick="toggleKit(' + i + ')"><span class="ico">' + k.ico + '</span>' + k.n + '</button>';
    }).join("") +
    '</div>' +
    '<button class="btn" onclick="confirmKit()">Confirmar kit (<span id="kn">0</span>/5)</button>' +
    '</div>';
  window.scrollTo(0, 0);
}
function toggleKit(i) {
  const p = kitSel.indexOf(i);
  if (p >= 0) kitSel.splice(p, 1); else kitSel.push(i);
  document.getElementById("ki" + i).classList.toggle("sel", p < 0);
  document.getElementById("kn").textContent = kitSel.length;
}
function confirmKit() {
  S.kitHecho = true;
  const correctos = PACK.kitItems.map(function (k, i) { return k.ok ? i : -1; }).filter(function (i) { return i >= 0; });
  const perfecto = kitSel.length === correctos.length && correctos.every(function (i) { return kitSel.indexOf(i) >= 0; });
  PACK.kitItems.forEach(function (k, i) {
    const el = document.getElementById("ki" + i);
    if (k.ok) el.classList.add("correcto");
    else if (kitSel.indexOf(i) >= 0) el.classList.add("errado");
  });
  const pts = perfecto ? 15 : 5;
  S.puntos += pts;
  if (perfecto) { S.kitPerfecto = true; sndBadge(); } else sndOk();
  showModal(perfecto ? "ok" : "info",
    (perfecto
      ? '<h2 class="bien">🦅 ¡Kit perfecto!</h2><div class="delta up">+15 pts</div><div class="exp"><strong>PREVI:</strong> Identificaste los 5 EPP sin caer en los señuelos. Los audífonos de música NO son protección auditiva.</div>'
      : '<h2>Kit revisado</h2><div class="delta up">+5 pts</div><div class="exp"><strong>PREVI:</strong> Mira la corrección en pantalla: los 5 correctos quedaron en verde. Ojo con los señuelos, como los audífonos de música.</div>') +
    '<button class="btn" onclick="closeModal();showRegla()">Continuar</button>');
}

/* ---------- Pregunta rápida ---------- */
function renderQuiz() {
  const q = escActual().quiz;
  app.innerHTML = hud() +
    '<div class="card" style="border-top:8px solid var(--blue)">' +
    '<h2 style="margin-top:0">⚡ Pregunta rápida</h2>' +
    '<p style="font-size:16.5px;font-weight:600">' + q.pregunta + '</p>' +
    q.opciones.map(function (o, i) {
      return '<button class="dec" onclick="answerQuiz(' + i + ')"><span class="letra">' + letras[i] + '</span><span>' + o + '</span></button>';
    }).join("") +
    '</div>';
  window.scrollTo(0, 0);
}
function answerQuiz(i) {
  const e = escActual(), q = e.quiz;
  const ok = i === q.correcta;
  if (ok) { S.puntos += q.pts; sndOk(); }
  else { S.quizFallos.push(e.titulo); sndBad(); }
  showModal(ok ? "ok" : "bad",
    (ok
      ? '<h2 class="bien">✅ ¡Correcto!</h2><div class="delta up">+' + q.pts + ' pts</div><div class="exp"><strong>PREVI:</strong> Lo aprendiste de verdad. Eso es lo que buscamos.</div>'
      : '<h2 class="alerta">Casi…</h2><div class="exp"><strong>PREVI:</strong> La respuesta era: <strong>' + q.opciones[q.correcta] + '</strong>.</div>') +
    '<button class="btn" onclick="closeModal();advance()">' + (S.pos + 1 < S.plan.length ? 'Siguiente escena →' : 'Ver mis resultados →') + '</button>');
}

/* ---------- Resultados ---------- */
function nivelDe(pct) {
  if (pct >= 90) return { n: "Líder SST", c: "b" };
  if (pct >= 70) return { n: "Nivel Seguro", c: "g" };
  if (pct >= 50) return { n: "Nivel Preventivo", c: "y" };
  return { n: "Nivel Básico", c: "r" };
}
function calcInsignias(pct) {
  const jugados = {};
  S.plan.forEach(function (i) { jugados[PACK.escenarios[i].id] = true; });
  const sinErr = function (ids) {
    return ids.every(function (id) { return jugados[id]; }) &&
           ids.every(function (id) { return !S.errores[id]; });
  };
  const r = {};
  PACK.insignias.forEach(function (b) {
    if (b.req) { r[b.id] = sinErr(b.req); return; }
    if (b.id === "aguila") r[b.id] = S.kitPerfecto;
    else if (b.id === "reportero") r[b.id] = S.reportes >= 2;
    else if (b.id === "cero") r[b.id] = S.totalErrores === 0;
    else if (b.id === "lider") r[b.id] = S.bien >= 80 && pct >= 85;
  });
  return r;
}
function renderResults() {
  const pct = clamp(Math.round((S.puntos / S.max) * 100));
  const niv = nivelDe(pct);
  const ins = calcInsignias(pct);
  const ganadas = PACK.insignias.filter(function (b) { return ins[b.id]; }).length;
  let reforzar = PACK.escenarios.filter(function (e) { return S.errores[e.id]; }).map(function (e) { return e.titulo; });
  S.quizFallos.forEach(function (t) { if (reforzar.indexOf(t) < 0) reforzar.push(t + " (pregunta de refuerzo)"); });

  guardarSesion(pct, niv.n);
  if (ganadas) sndBadge();

  app.innerHTML =
    '<div class="card res-head">' +
    '<div style="font-size:38px">' + S.avatar + '</div>' +
    '<div style="font-weight:700;font-size:19px">' + esc(S.nombre) + ', tu turno terminó</div>' +
    '<div style="font-size:13px;color:var(--muted)">' + MODOS[S.modo].label + ' · ' + S.plan.length + ' escenas</div>' +
    '<div class="res-pct" style="color:var(--green)">' + pct + '%</div>' +
    '<div>' + S.puntos + ' de ' + S.max + ' puntos · Bienestar final: ' + S.bien + '%</div>' +
    '<div class="nivel tag ' + niv.c + '" style="font-size:16px">' + niv.n + '</div>' +
    '</div>' +
    '<div class="card"><h3 style="margin-top:0">🎖️ Insignias (' + ganadas + '/' + PACK.insignias.length + ')</h3><div class="badges">' +
    PACK.insignias.map(function (b) {
      return '<div class="badge ' + (ins[b.id] ? '' : 'off') + '"><span class="ico">' + b.ico + '</span>' + b.n + '</div>';
    }).join("") +
    '</div></div>' +
    (reforzar.length
      ? '<div class="card" style="border-top:6px solid var(--yellow)"><h3 style="margin-top:0">📚 Para reforzar</h3><ul>' +
        reforzar.map(function (t) { return '<li>' + t + '</li>'; }).join("") + '</ul></div>'
      : '<div class="card" style="border-top:6px solid var(--green)"><strong>🏆 Turno impecable:</strong> ningún acto inseguro. Así se ve la cultura preventiva.</div>') +
    '<button class="btn blue" onclick="imprimirCert(' + pct + ',\'' + niv.n + '\')">📄 Descargar constancia</button>' +
    '<button class="btn" onclick="renderModos()">Jugar de nuevo</button>' +
    '<button class="btn sec" onclick="renderHome()">Volver al inicio</button>';
  window.scrollTo(0, 0);

  const sinMovimiento = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const pctEl = document.querySelector(".res-pct");
  if (!sinMovimiento && pctEl) {
    const t0 = performance.now();
    (function paso(t) {
      const k = Math.min(1, (t - t0) / 1000);
      pctEl.textContent = Math.round(pct * (1 - Math.pow(1 - k, 3))) + "%";
      if (k < 1) requestAnimationFrame(paso);
    })(t0);
  }
  document.querySelectorAll(".badge").forEach(function (b, i) {
    b.style.animationDelay = (0.15 + i * 0.07) + "s";
  });
  if (!sinMovimiento && pct >= 70) lanzarConfeti();
}

function lanzarConfeti() {
  const c = document.createElement("div");
  c.className = "confetti";
  const colores = ["#00795C", "#F2B705", "#0A5CA8", "#E57373", "#FFD54F", "#4DB6AC"];
  for (let i = 0; i < 80; i++) {
    const p = document.createElement("i");
    p.style.left = (Math.random() * 100) + "%";
    p.style.background = colores[i % colores.length];
    p.style.animationDuration = (2.2 + Math.random() * 2) + "s";
    p.style.animationDelay = (Math.random() * 0.9) + "s";
    p.style.transform = "rotate(" + Math.round(Math.random() * 360) + "deg)";
    c.appendChild(p);
  }
  document.body.appendChild(c);
  setTimeout(function () { c.remove(); }, 5500);
}

/* ---------- Historial y CSV ---------- */
function esc(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;"); }
function getSesiones() {
  try { return JSON.parse(localStorage.getItem("ts_sesiones") || "[]"); } catch (e) { return []; }
}
function guardarSesion(pct, nivel) {
  const arr = getSesiones();
  arr.unshift({ nombre: S.nombre, fecha: new Date().toLocaleString("es-CO"), modo: MODOS[S.modo].label,
                puntos: S.puntos, pct: pct, nivel: nivel, errores: S.totalErrores, errs: S.errores });
  localStorage.setItem("ts_sesiones", JSON.stringify(arr.slice(0, 100)));
}
function renderHistorial() {
  const arr = getSesiones();
  app.innerHTML =
    '<div class="card"><h2 style="margin-top:0">📊 Resultados guardados</h2>' +
    (arr.length === 0
      ? '<p style="color:var(--muted)">Aún no hay partidas registradas en este dispositivo.</p>'
      : '<div style="overflow-x:auto"><table class="hist"><tr><th>Nombre</th><th>Fecha</th><th>Modo</th><th>Pts</th><th>%</th><th>Nivel</th><th>Err.</th></tr>' +
        arr.map(function (s) {
          return '<tr><td>' + esc(s.nombre) + '</td><td>' + esc(s.fecha) + '</td><td>' + esc(s.modo || "—") + '</td><td>' + s.puntos + '</td><td>' + s.pct + '%</td><td>' + esc(s.nivel) + '</td><td>' + s.errores + '</td></tr>';
        }).join("") + '</table></div>') +
    (arr.length ? '<button class="btn blue" onclick="exportCSV()">⬇ Exportar CSV</button>' : '') +
    '<button class="btn sec" onclick="renderHome()">Volver</button>' +
    '</div>';
}
function exportCSV() {
  const arr = getSesiones();
  const filas = [["Nombre", "Fecha", "Modo", "Puntos", "Porcentaje", "Nivel", "Errores"]].concat(
    arr.map(function (s) { return [s.nombre, s.fecha, s.modo || "", s.puntos, s.pct, s.nivel, s.errores]; })
  );
  const csv = "﻿" + filas.map(function (f) {
    return f.map(function (c) { return '"' + String(c).replace(/"/g, '""') + '"'; }).join(";");
  }).join("\r\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv], { type: "text/csv;charset=utf-8" }));
  a.download = "resultados_turno_seguro.csv";
  a.click();
  URL.revokeObjectURL(a.href);
}

function renderAdminPin() {

    '<div class="card" style="border-top:8px solid var(--ink)">' +
    '<h2 style="margin-top:0">🔐 Acceso administrador</h2>' +
    '<p style="color:var(--muted);font-size:14px">Panel para el área de SST / Gestión Humana. PIN inicial del prototipo: <code>2026</code> (cámbialo en <code>PACK.adminPin</code> antes de usarlo con trabajadores).</p>' +
    '<input type="text" id="pin" inputmode="numeric" maxlength="8" placeholder="PIN" autocomplete="off">' +
    '<p id="pinErr" style="color:var(--red);font-weight:600;margin:0"></p>' +

function checkPin() {
  const v = document.getElementById("pin").value.trim();
  if (v === PACK.adminPin) { sessionStorage.setItem("ts_admin", "1"); renderAdmin(); }
  else { document.getElementById("pinErr").textContent = "PIN incorrecto."; sndBad(); }
}
function renderAdmin() {
  const arr = getSesiones();
  const tot = arr.length;
  const prom = tot ? Math.round(arr.reduce(function (a, s) { return a + s.pct; }, 0) / tot) : 0;
  const niveles = {};
  arr.forEach(function (s) { niveles[s.nivel] = (niveles[s.nivel] || 0) + 1; });
  const ordenNiv = ["Líder SST", "Nivel Seguro", "Nivel Preventivo", "Nivel Básico"];
  const errAgg = {};
  arr.forEach(function (s) {
    if (s.errs) Object.keys(s.errs).forEach(function (id) { errAgg[id] = (errAgg[id] || 0) + s.errs[id]; });
  });
  const top = Object.keys(errAgg).map(function (id) {
    const e = PACK.escenarios.find(function (x) { return x.id === id; });
    return { n: e ? e.titulo : id, c: errAgg[id] };
  }).sort(function (a, b) { return b.c - a.c; }).slice(0, 6);
  const maxErr = top.length ? top[0].c : 1;
  const emp = PACK.empresa;

  app.innerHTML =
    '<div class="card" style="border-top:8px solid var(--ink)">' +
    '<h2 style="margin-top:0">🔐 Panel SST</h2>' +
    '<div style="display:flex;gap:10px;text-align:center">' +
    '<div style="flex:1"><div style="font-size:30px;font-weight:800">' + tot + '</div><div style="font-size:12px;color:var(--muted)">partidas</div></div>' +
    '<div style="flex:1"><div style="font-size:30px;font-weight:800;color:var(--green)">' + prom + '%</div><div style="font-size:12px;color:var(--muted)">promedio</div></div>' +
    '<div style="flex:1"><div style="font-size:30px;font-weight:800;color:var(--red)">' + arr.reduce(function (a, s) { return a + (s.errores || 0); }, 0) + '</div><div style="font-size:12px;color:var(--muted)">actos inseguros</div></div>' +
    '</div>' +
    '<h3>Distribución por nivel</h3>' +
    (tot === 0 ? '<p style="color:var(--muted)">Sin partidas aún.</p>' :
      ordenNiv.filter(function (n) { return niveles[n]; }).map(function (n) {
        return '<div class="mapa-item"><span class="tag ' + nivelDe(n === "Líder SST" ? 95 : n === "Nivel Seguro" ? 75 : n === "Nivel Preventivo" ? 55 : 20).c + '">' + n + '</span><span>' + niveles[n] + ' persona(s)</span></div>';
      }).join("")) +
    '</div>' +
    '<div class="card" style="border-top:6px solid var(--red)">' +
    '<h3 style="margin-top:0">🔥 Escenarios con más errores</h3>' +
    '<p style="font-size:13px;color:var(--muted);margin-top:0">Aquí está tu plan de refuerzo: estos son los riesgos que el equipo aún no domina.</p>' +
    (top.length === 0 ? '<p style="color:var(--muted)">Sin datos de errores todavía.</p>' :
      top.map(function (t) {
        return '<div style="margin:8px 0"><div style="display:flex;justify-content:space-between;font-size:14px"><span>' + t.n + '</span><strong>' + t.c + '</strong></div>' +
          '<div class="bar"><div style="width:' + Math.round(t.c / maxErr * 100) + '%;background:var(--red)"></div></div></div>';
      }).join("")) +
    '</div>' +
    '<div class="card" style="border-top:6px solid var(--blue)">' +
    '<h3 style="margin-top:0">🎨 Marca de la empresa</h3>' +
    '<label style="font-weight:600;font-size:14px">Nombre</label>' +
    '<input type="text" id="bNombre" maxlength="60" value="' + esc(emp.nombre) + '" placeholder="Nombre de la empresa">' +
    '<div style="display:flex;gap:12px;align-items:center;margin-bottom:12px">' +
    '<div><label style="font-weight:600;font-size:14px">Color</label><br><input type="color" id="bColor" value="' + (emp.color || "#00795C") + '" style="width:56px;height:38px;border:2px solid var(--line);border-radius:8px;background:var(--surface)"></div>' +
    '<div style="flex:1"><label style="font-weight:600;font-size:14px">Logo (emoji)</label>' +
    '<input type="text" id="bLogo" maxlength="4" value="' + esc(emp.logo) + '" placeholder="🦺" style="margin-bottom:0"></div>' +
    '</div>' +
    '<button class="btn blue" onclick="guardarBrand()">Guardar marca</button>' +
    '</div>' +
    '<button class="btn blue" onclick="exportCSV()">⬇ Exportar resultados (CSV)</button>' +
    '<button class="btn sec" onclick="renderHistorial()">📊 Ver historial detallado</button>' +
    '<button class="btn sec" style="color:var(--red);border-color:var(--red)" onclick="confirmarBorrado()">🗑 Borrar todos los resultados</button>' +
    '<button class="btn sec" onclick="renderHome()">Volver al inicio</button>';
  window.scrollTo(0, 0);
}
function guardarBrand() {
  const conf = {
    nombre: document.getElementById("bNombre").value.trim(),
    color: document.getElementById("bColor").value,
    logo: document.getElementById("bLogo").value.trim()
  };
  localStorage.setItem("ts_empresa", JSON.stringify(conf));
  Object.assign(PACK.empresa, conf);
  applyBrand();
  sndOk();
  showModal("ok", '<h2 class="bien">✅ Marca guardada</h2><p>La portada, los botones y la constancia ya usan la identidad de ' + (esc(conf.nombre) || "tu empresa") + '.</p>' +
    '<button class="btn" onclick="closeModal();renderAdmin()">Continuar</button>');
}
function confirmarBorrado() {
  showModal("bad", '<h2 class="alerta">🗑 ¿Borrar todos los resultados?</h2>' +
    '<p>Se eliminarán las ' + getSesiones().length + ' partidas guardadas en este dispositivo. Esta acción no se puede deshacer. Exporta el CSV antes si necesitas conservarlas.</p>' +
    '<button class="btn" style="background:var(--red)" onclick="doBorrar()">Sí, borrar todo</button>' +
    '<button class="btn sec" onclick="closeModal()">Cancelar</button>');
}
function doBorrar() {
  localStorage.removeItem("ts_sesiones");
  closeModal();
  renderAdmin();
}

/* ---------- Modales ---------- */
function showModal(tipo, html) {
  closeModal();
  const ov = document.createElement("div");
  ov.className = "overlay"; ov.id = "ovl";
  ov.innerHTML = '<div class="modal ' + tipo + '">' + html + '</div>';
  document.body.appendChild(ov);
}
function closeModal() {
  const ov = document.getElementById("ovl");
  if (ov) ov.remove();
}

/* ---------- Exponer handlers ---------- */
window.toggleMute = toggleMute; window.renderSetup = renderSetup; window.renderAprende = renderAprende;
window.renderHome = renderHome; window.renderHistorial = renderHistorial; window.renderModos = renderModos;
window.pickAvatar = pickAvatar; window.startGame = startGame; window.renderMapa = renderMapa;
window.renderScene = renderScene; window.decidir = decidir; window.afterSafe = afterSafe;
window.showRegla = showRegla; window.advance = advance; window.toggleKit = toggleKit;
window.confirmKit = confirmKit; window.renderQuiz = renderQuiz; window.answerQuiz = answerQuiz;
window.renderResults = renderResults; window.exportCSV = exportCSV; window.imprimirCert = imprimirCert;
window.closeModal = closeModal; window.showMapaModal = showMapaModal; window.PACK = PACK;
window.renderAdminPin = renderAdminPin; window.checkPin = checkPin; window.renderAdmin = renderAdmin;
window.guardarBrand = guardarBrand; window.confirmarBorrado = confirmarBorrado; window.doBorrar = doBorrar;

applyBrand();
resetState("completo");
renderHome();
</script>
</body>
</html>
