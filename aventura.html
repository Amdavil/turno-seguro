<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Turno Seguro — Modo Aventura</title>
<style>
  :root {
    --ink: #1F262A; --muted: #5B6871; --line: #D5DCD3;
    --green: #00795C; --green-hi: #009B76; --green-deep: #00503B; --green-soft: #DFF0E8;
    --yellow: #F2B705; --yellow-ink: #8A6200;
    --red: #B62233; --red-soft: #FADDE0;
    --blue: #0A5CA8; --blue-soft: #E0EDF9;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  html, body { margin: 0; height: 100%; }
  body {
    background: linear-gradient(165deg, #22282B 0%, #14181A 100%);
    font-family: "Segoe UI", -apple-system, Roboto, sans-serif;
    color: var(--ink);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; overflow: hidden;
  }
  #stage {
    position: relative; width: min(100vw, 178vh); aspect-ratio: 16/9;
    max-width: 1180px; box-shadow: 0 30px 80px rgba(0,0,0,0.65);
    border-radius: 12px; overflow: hidden;
  }
  canvas { display: block; width: 100%; height: 100%; background: #DDE6E2; }
  #stage.frozen canvas { filter: grayscale(1) contrast(1.15); }
  #stage.shake { animation: shake 0.5s both; }
  @keyframes shake {
    10%,90% { transform: translateX(-3px); } 20%,80% { transform: translateX(5px); }
    30%,50%,70% { transform: translateX(-8px); } 40%,60% { transform: translateX(8px); }
  }

  /* HUD */
  #hud {
    position: absolute; top: 10px; left: 10px; right: 10px;
    display: flex; align-items: center; gap: 10px; z-index: 10;
    background: rgba(255,255,255,0.9); backdrop-filter: blur(6px);
    border-radius: 12px; padding: 7px 12px; font-size: 14px; font-weight: 700;
    box-shadow: 0 6px 16px rgba(0,0,0,0.3);
  }
  #hud .pts { color: var(--green); font-size: 17px; font-variant-numeric: tabular-nums; white-space: nowrap; }
  #hud .bienwrap { flex: 1; }
  #hud .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.09em; color: var(--muted); }
  .bar { height: 11px; background: rgba(31,38,42,0.15); border-radius: 8px; overflow: hidden; }
  .bar > div { height: 100%; border-radius: 8px; background: linear-gradient(180deg, var(--green-hi), var(--green)); transition: width 0.3s; }
  .bar.warn > div { background: linear-gradient(180deg, #FFCB2E, var(--yellow)); }
  .bar.low > div { background: linear-gradient(180deg, #D53A4C, var(--red)); animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: 0.5; } }
  #hud button { background: none; border: none; font-size: 18px; cursor: pointer; padding: 2px; }

  /* Objetivo actual */
  #objetivo {
    position: absolute; top: 56px; left: 50%; transform: translateX(-50%);
    z-index: 9; max-width: 92%;
    background: rgba(31,38,42,0.85); color: #fff;
    border-radius: 999px; padding: 7px 18px;
    font-size: 13.5px; font-weight: 700; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
    box-shadow: 0 6px 16px rgba(0,0,0,0.35);
  }
  #objetivo .chip { color: #FFD54F; margin-right: 6px; }

  /* Toast PREVI */
  #toast {
    position: absolute; top: 96px; left: 50%; transform: translateX(-50%);
    max-width: 88%; z-index: 10; display: none;
    background: linear-gradient(180deg, #FFFFFF, var(--blue-soft));
    border: 1px solid rgba(10,92,168,0.25); border-radius: 14px;
    padding: 9px 16px; font-size: 14.5px; font-weight: 600;
    box-shadow: 0 8px 20px rgba(0,0,0,0.35);
    animation: toastIn 0.3s ease both;
  }
  #toast strong { color: var(--blue); }
  @keyframes toastIn { from { opacity: 0; transform: translate(-50%,-8px); } to { opacity: 1; transform: translate(-50%,0); } }

  /* Botón de interacción grande (aparece cuando estás cerca) */
  #accionUI {
    position: absolute; bottom: 96px; left: 50%; transform: translateX(-50%);
    z-index: 11; display: none; border: none; cursor: pointer; font-family: inherit;
    background: linear-gradient(180deg, var(--green-hi), var(--green));
    color: #fff; font-weight: 800; font-size: 17px; padding: 13px 26px;
    border-radius: 999px; box-shadow: 0 5px 0 var(--green-deep), 0 12px 28px rgba(0,0,0,0.4);
    animation: bounceIn 0.35s cubic-bezier(0.2,1.5,0.4,1) both;
  }
  #accionUI:active { transform: translate(-50%, 4px); box-shadow: 0 0 0 var(--green-deep); }
  @keyframes bounceIn { from { opacity: 0; transform: translate(-50%, 16px) scale(0.7); } to { opacity: 1; transform: translate(-50%,0) scale(1); } }

  /* Controles táctiles */
  #controles {
    position: absolute; bottom: 12px; left: 0; right: 0; z-index: 10;
    display: flex; justify-content: space-between; padding: 0 14px;
    pointer-events: none;
  }
  #controles .grupo { display: flex; gap: 14px; }
  .cbtn {
    pointer-events: auto; user-select: none;
    width: 64px; height: 64px; border-radius: 50%;
    border: none; font-size: 26px; font-weight: 800; cursor: pointer;
    background: rgba(255,255,255,0.6); color: var(--ink);
    box-shadow: 0 5px 0 rgba(0,0,0,0.3), 0 10px 22px rgba(0,0,0,0.35);
    display: flex; align-items: center; justify-content: center;
  }
  .cbtn:active, .cbtn.on { transform: translateY(4px); box-shadow: 0 1px 0 rgba(0,0,0,0.3); background: #fff; }
  @media (pointer: fine) and (min-width: 800px) { #controles { display: none; } }

  /* Overlays */
  #overlay {
    position: absolute; inset: 0; z-index: 20; display: none;
    background: rgba(14,20,18,0.62); backdrop-filter: blur(3px);
    align-items: center; justify-content: center; padding: 16px;
  }
  #overlay.visible { display: flex; }
  .panel {
    background: #fff; border-radius: 20px; padding: 22px 24px;
    max-width: 500px; width: 100%; max-height: 92%; overflow-y: auto;
    box-shadow: 0 24px 60px rgba(0,0,0,0.45);
    animation: panelIn 0.32s cubic-bezier(0.2,1.4,0.4,1) both;
  }
  @keyframes panelIn { from { opacity: 0; transform: scale(0.85) translateY(18px); } to { opacity: 1; transform: none; } }
  .panel.bad { border-top: 8px solid var(--red); }
  .panel.ok { border-top: 8px solid var(--green); }
  .panel.info { border-top: 8px solid var(--blue); }
  .panel h2 { margin: 0 0 8px; font-size: 22px; font-weight: 800; }
  .panel h2.alerta { color: var(--red); }
  .panel .exp {
    background: var(--blue-soft); border-left: 4px solid var(--blue);
    border-radius: 10px; padding: 10px 14px; font-size: 14.5px; margin: 12px 0;
  }
  .panel .exp strong { color: var(--blue); }
  .panel .regla { font-size: 17px; font-weight: 800; text-align: center; padding: 8px; color: var(--yellow-ink); }
  .btn {
    display: block; width: 100%; border: none; cursor: pointer;
    background: linear-gradient(180deg, var(--green-hi), var(--green));
    color: #fff; font-weight: 800; font-size: 16.5px; padding: 13px 18px;
    border-radius: 14px; font-family: inherit; margin: 9px 0;
    box-shadow: 0 4px 0 var(--green-deep), 0 8px 18px rgba(0,0,0,0.2);
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 0 0 var(--green-deep); }
  .btn.sec { background: #fff; color: var(--ink); border: 2px solid var(--line); box-shadow: 0 3px 0 var(--line); }
  .kit-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 12px 0; }
  .kit-item {
    border: 2px solid var(--line); background: #fff; border-radius: 12px;
    padding: 8px 4px; text-align: center; cursor: pointer; font-family: inherit;
    font-size: 11px; font-weight: 600; color: var(--ink); box-shadow: 0 3px 0 var(--line);
  }
  .kit-item .ico { font-size: 24px; display: block; }
  .kit-item.sel { border-color: var(--green); background: var(--green-soft); box-shadow: 0 3px 0 var(--green); }
  .kit-item.errado { border-color: var(--red); background: var(--red-soft); }
  .medallas { display: flex; gap: 10px; justify-content: center; margin: 10px 0; flex-wrap: wrap; }
  .medalla { text-align: center; font-size: 12px; font-weight: 700; width: 100px; }
  .medalla .ico { font-size: 34px; display: block; filter: drop-shadow(0 3px 5px rgba(0,0,0,0.25)); }
  .medalla.off { opacity: 0.3; filter: grayscale(1); }
  .res-pct {
    font-size: 54px; font-weight: 900; text-align: center; line-height: 1.05;
    background: linear-gradient(120deg, var(--green), var(--blue));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .nivel { display: block; text-align: center; font-size: 16px; font-weight: 800; margin: 6px 0; }
  input[type=text] {
    width: 100%; font-size: 17px; padding: 12px 14px; border-radius: 12px;
    border: 2px solid var(--line); font-family: inherit; margin: 6px 0 12px;
  }
  .ctl-demo { display: flex; gap: 14px; justify-content: center; margin: 10px 0; }
  .ctl-demo .k {
    background: #fff; border: 2px solid var(--line); border-radius: 10px;
    box-shadow: 0 3px 0 var(--line); padding: 8px 14px;
    font-weight: 800; font-size: 15px; text-align: center;
  }
  .ctl-demo .k small { display: block; font-size: 10.5px; font-weight: 600; color: var(--muted); }
  .flash {
    position: absolute; inset: 0; pointer-events: none; z-index: 15;
    background: radial-gradient(ellipse at center, rgba(182,34,51,0) 35%, rgba(182,34,51,0.45) 100%);
    animation: flashOut 0.8s ease-out forwards;
  }
  @keyframes flashOut { to { opacity: 0; } }
  .confetti { position: absolute; inset: 0; pointer-events: none; z-index: 25; overflow: hidden; }
  .confetti i { position: absolute; top: -16px; width: 9px; height: 14px; border-radius: 2px; animation: cf linear forwards; }
  @keyframes cf { to { transform: translateY(110vh) rotate(680deg); } }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
</style>
</head>
<body>
<div id="stage">
  <canvas id="cv"></canvas>
  <div id="hud">
    <span style="font-size:20px">👷</span>
    <span class="pts" id="hudPts">0 pts</span>
    <div class="bienwrap">
      <div class="lbl" id="hudBienLbl">Bienestar 100%</div>
      <div class="bar" id="hudBar"><div style="width:100%"></div></div>
    </div>
    <button id="muteBtn" aria-label="Silenciar">🔊</button>
    <button onclick="location.href='index.html'" aria-label="Salir">🏠</button>
  </div>
  <div id="objetivo"><span class="chip">🎯</span><span id="objTxt">…</span></div>
  <div id="toast"></div>
  <button id="accionUI">⚡ Interactuar</button>
  <div id="controles">
    <div class="grupo">
      <button class="cbtn" id="btnIzq" aria-label="Izquierda">◀</button>
      <button class="cbtn" id="btnDer" aria-label="Derecha">▶</button>
    </div>
  </div>
  <div id="overlay"></div>
</div>

<script>
"use strict";
/* =====================================================================
   TURNO SEGURO — MODO AVENTURA v2 (nivel 1: Mundo Operativo)
   ← → / A D mover · E, espacio, tocar la pantalla o el botón verde:
   interactuar. Objetivo siempre visible con flecha guía.
   ===================================================================== */

const W = 960, H = 540, PISO = 448, MUNDO = 5700;
const cv = document.getElementById("cv"), ctx = cv.getContext("2d");
const stage = document.getElementById("stage"), overlay = document.getElementById("overlay");
const accionUI = document.getElementById("accionUI");
const dpr = Math.min(2, window.devicePixelRatio || 1);
cv.width = W * dpr; cv.height = H * dpr; ctx.scale(dpr, dpr);

/* ---------- Estado ---------- */
const S = {
  nombre: "", x: 120, dir: 1, andando: false, animT: 0,
  epp: false, oidos: false, inv: 0,
  puntos: 0, bien: 100, errores: 0, errs: {}, reportes: 0,
  checkpoint: 120, pausado: true, fin: false, t: 0,
  flags: { apilado: false, contacto: false, protector: false, electrico: false,
           alarma: false, evacT0: 0, evacBonus: false,
           kitIntentos: 0, avisos: {} },
  limpio: { bodega: true, monta: true, ruido: true }
};
const MAX = 175;
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

/* ---------- Audio ---------- */
let actx = null, muted = false;
function tone(seq) {
  if (muted) return;
  try {
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    let t = actx.currentTime;
    seq.forEach(p => {
      const o = actx.createOscillator(), g = actx.createGain();
      o.type = p.w || "sine"; o.frequency.value = p.f;
      g.gain.setValueAtTime(0.1, t); g.gain.exponentialRampToValueAtTime(0.001, t + p.d);
      o.connect(g); g.connect(actx.destination); o.start(t); o.stop(t + p.d); t += p.d * 0.85;
    });
  } catch (e) {}
}
const sndOk = () => tone([{f:523,d:0.12},{f:784,d:0.2}]);
const sndBad = () => tone([{f:330,d:0.15},{f:196,d:0.3}]);
const sndAlerta = () => tone([{f:880,d:0.1,w:"square"},{f:880,d:0.1,w:"square"}]);
const sndPick = () => tone([{f:660,d:0.08},{f:880,d:0.1}]);
const sndBeep = () => tone([{f:740,d:0.09,w:"square"}]);
document.getElementById("muteBtn").onclick = function () {
  muted = !muted; this.textContent = muted ? "🔇" : "🔊";
};

/* ---------- Entrada ---------- */
const keys = {};
let accionPulsada = false;
addEventListener("keydown", e => {
  if (["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"," "].includes(e.key)) e.preventDefault();
  keys[e.key.toLowerCase()] = true;
  if ((e.key === "e" || e.key === "E" || e.key === " ") && !e.repeat) accionPulsada = true;
});
addEventListener("keyup", e => { keys[e.key.toLowerCase()] = false; });
function bindBtn(id, key) {
  const b = document.getElementById(id);
  const on = ev => { ev.preventDefault(); keys[key] = true; b.classList.add("on"); };
  const off = ev => { ev.preventDefault(); keys[key] = false; b.classList.remove("on"); };
  b.addEventListener("pointerdown", on);
  b.addEventListener("pointerup", off);
  b.addEventListener("pointerleave", off);
  b.addEventListener("pointercancel", off);
}
bindBtn("btnIzq", "arrowleft");
bindBtn("btnDer", "arrowright");
accionUI.addEventListener("pointerdown", e => { e.preventDefault(); accionPulsada = true; });
/* TOCA A DÓNDE IR: el personaje camina solo hasta el punto tocado */
let targetX = null, camActual = 0;
cv.addEventListener("pointerdown", e => {
  if (S.pausado || S.fin) return;
  const r = cv.getBoundingClientRect();
  const wx = camActual + ((e.clientX - r.left) / r.width) * W;
  targetX = clamp(wx, 40, MUNDO - 60);
  S.flags.avisos.primerTap = true;
  sndPick();
});

/* ---------- HUD, objetivo y toast ---------- */
function hud() {
  document.getElementById("hudPts").textContent = S.puntos + " pts";
  document.getElementById("hudBienLbl").textContent = "Bienestar " + Math.round(S.bien) + "%";
  const bar = document.getElementById("hudBar");
  bar.className = "bar" + (S.bien < 30 ? " low" : S.bien < 60 ? " warn" : "");
  bar.firstElementChild.style.width = clamp(S.bien, 0, 100) + "%";
}
function objetivoActual() {
  if (!S.epp) return { x: 250, txt: "Arma tu EPP en el casillero" };
  if (S.x < 1400) return { x: 1400, txt: "Cruza la bodega — no pases bajo la sombra roja" };
  if (!S.flags.contacto && S.x < 2380) return { x: 1565, txt: "Activa el contacto visual y cruza el montacargas" };
  if (S.x < 2400) return { x: 2420, txt: "Cruza la zona del montacargas" };
  if (!S.oidos && S.x < 3260) return { x: 2470, txt: "Toma los protectores auditivos 🎧" };
  if (S.x < 3320) return { x: 3340, txt: "Cruza la sala de compresores" };
  if (!S.flags.electrico && S.x < 3800) return { x: 3660, txt: "Señaliza y reporta el cable eléctrico" };
  if (!S.flags.alarma) return { x: 4360, txt: "Avanza hacia el final del turno →" };
  return { x: 5490, txt: "🚨 ¡Evacúa! Ve al punto de encuentro" };
}
let toastTimer = null;
function toast(msg, dur) {
  const t = document.getElementById("toast");
  t.innerHTML = "<strong>PREVI:</strong> " + msg;
  t.style.display = "block";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.display = "none"; }, dur || 4500);
}
function avisoUnaVez(id, msg, dur) {
  if (S.flags.avisos[id]) return;
  S.flags.avisos[id] = true;
  toast(msg, dur);
}

/* ---------- Overlays ---------- */
function panel(html, tipo) {
  overlay.innerHTML = '<div class="panel ' + (tipo || "info") + '">' + html + '</div>';
  overlay.classList.add("visible");
  S.pausado = true;
}
function cerrarPanel() {
  overlay.classList.remove("visible");
  overlay.innerHTML = "";
  stage.classList.remove("frozen");
  S.pausado = false;
}
function flashRojo() {
  const f = document.createElement("div");
  f.className = "flash";
  stage.appendChild(f);
  setTimeout(() => f.remove(), 850);
}

/* ---------- Lecciones ---------- */
const LECCIONES = {
  caida: { t: "Golpe por caída de objeto", exp: "Estabas bajo la zona de carga cuando cayó la caja. La sombra roja que parpadea es tu aviso: espera a que caiga y pasa después.", regla: "Bajo carga suspendida, nunca te pares." },
  monta: { t: "Casi-accidente con montacargas", exp: "El operador con carga tiene puntos ciegos enormes. Usa el botón de contacto visual en la entrada de la zona: se detiene y te muestra un ✓ para cruzar.", regla: "Cruce peatonal + mirada al operador." },
  electrico: { t: "Descarga eléctrica evitada en la simulación", exp: "Nunca te acerques a un cable energizado. Señaliza, aléjate y repórtalo en el punto de reporte para que venga personal autorizado.", regla: "Cable suelto: señaliza, aléjate, reporta." }
};
function leccion(id) {
  const l = LECCIONES[id];
  S.errores++; S.errs[id] = (S.errs[id] || 0) + 1;
  S.puntos = Math.max(0, S.puntos - 10);
  S.bien = clamp(S.bien - 20, 0, 100);
  if (id === "caida") S.limpio.bodega = false;
  if (id === "monta") S.limpio.monta = false;
  stage.classList.add("frozen", "shake");
  setTimeout(() => stage.classList.remove("shake"), 550);
  flashRojo(); sndAlerta(); setTimeout(sndBad, 250);
  hud();
  panel(
    '<h2 class="alerta">⚠️ ' + l.t + '</h2>' +
    '<div style="font-size:26px;font-weight:900;color:var(--red)">−10 pts · bienestar −20%</div>' +
    '<div class="exp"><strong>PREVI:</strong> ' + l.exp + '</div>' +
    '<p class="regla">📌 “' + l.regla + '”</p>' +
    '<button class="btn" onclick="reintentar()">Reintentar desde la zona</button>', "bad");
}
function reintentar() {
  S.x = S.checkpoint;
  S.inv = 2.2; /* invulnerable un momento para reubicarte con calma */
  cerrarPanel();
}

/* ---------- Entidades ---------- */
const cajas = [
  { x: 810, fase: 0 },
  { x: 1010, fase: 1.7 },
  { x: 1210, fase: 3.4 }
].map(c => ({ ...c, estado: "espera", t: c.fase, y: -80 }));
const CICLO = { espera: 1.6, aviso: 1.4, cae: 0.5, suelo: 0.9 };

const monta = { x: 1650, dir: 1, vel: 120, pausa: 0, beepT: 0 };
const tecnico = { visible: false, x: 3980, llega: 0 };

const INTER = [
  { id: "locker", x: 250, label: "🧰 Abrir casillero de EPP", activo: () => !S.epp, usar: abrirKit },
  { id: "apilado", x: 1370, label: "📣 Reportar arrume inestable", activo: () => S.epp && !S.flags.apilado, usar: () => {
      S.flags.apilado = true; S.reportes++; S.puntos += 20; sndOk(); hud();
      toast("¡Reporte enviado! Esa pila inestable ya no sorprenderá a nadie. <strong>+20</strong>");
    } },
  { id: "contacto", x: 1565, label: "👀 Hacer contacto visual", activo: () => S.epp && !S.flags.contacto, usar: () => {
      S.flags.contacto = true; monta.pausa = 6; S.puntos += 20; sndOk(); hud();
      toast("El operador te vio y se detuvo (✓ verde). ¡Cruza ahora! <strong>+20</strong>");
    } },
  { id: "protector", x: 2470, label: "🎧 Tomar protectores auditivos", activo: () => S.epp && !S.oidos, usar: () => {
      S.oidos = true; S.puntos += 10; sndPick(); hud();
      toast("Protectores puestos. Ahora sí, a la zona de ruido. <strong>+10</strong>");
    } },
  { id: "electrico", x: 3660, label: "🚧 Señalizar y reportar", activo: () => S.epp && !S.flags.electrico, usar: () => {
      S.flags.electrico = true; S.reportes++; S.puntos += 20; sndOk(); hud();
      tecnico.visible = true; tecnico.llega = S.t + 1.4;
      toast("Zona señalizada y reporte enviado: viene el personal autorizado. <strong>+20</strong>");
    } }
];
const RADIO_INTER = 95;
function interCercano() {
  let mejor = null, dist = RADIO_INTER;
  INTER.forEach(it => {
    if (!it.activo()) return;
    const d = Math.abs(S.x - it.x);
    if (d < dist) { dist = d; mejor = it; }
  });
  return mejor;
}
function accionar() {
  const it = interCercano();
  if (it) it.usar();
}

/* ---------- Kit EPP ---------- */
const KIT = [
  { n: "Casco", ico: "⛑️", ok: true }, { n: "Gafas", ico: "🥽", ok: true },
  { n: "Chaleco", ico: "🦺", ok: true }, { n: "Botas", ico: "🥾", ok: true },
  { n: "Auditiva", ico: "🎧", ok: true }, { n: "Gorra", ico: "🧢", ok: false },

/* ---------- Actualización ---------- */
function update(dt) {
  S.t += dt;
  if (S.inv > 0) S.inv -= dt;

  let vx = 0;
  if (keys["arrowleft"] || keys["a"]) vx -= 1;
  if (keys["arrowright"] || keys["d"]) vx += 1;
  if (vx !== 0) targetX = null; /* el teclado manda si se usa */
  else if (targetX !== null) {
    const d = targetX - S.x;
    if (Math.abs(d) > 8) vx = Math.sign(d);
    else targetX = null;
  }
  S.andando = vx !== 0;
  if (vx !== 0) { S.dir = vx; S.animT += dt * 9; }
  S.x = clamp(S.x + vx * 250 * dt, 40, MUNDO - 60);

  /* barrera EPP */
  if (!S.epp && S.x > 415) {
    S.x = 415;
    if (targetX !== null && targetX > 415) targetX = null;
    avisoUnaVez("gate", "La barrera no abre sin tu EPP completo. Toca el casillero para equiparte.", 4500);
  }
  /* interacción AUTOMÁTICA al llegar a un punto usable */
  const cerca = interCercano();
  if (cerca && Math.abs(S.x - cerca.x) < 58 && S.t > (cerca.cdT || 0)) {
    cerca.cdT = S.t + 3;
    if (targetX !== null && Math.abs(targetX - cerca.x) < 130) targetX = null;
    cerca.usar();
  }

  /* checkpoints monotónicos */
  if (S.x > 620 && S.checkpoint < 640) S.checkpoint = 640;
  if (S.x > 1480 && S.checkpoint < 1500) S.checkpoint = 1500;
  if (S.x > 2400 && S.checkpoint < 2420) S.checkpoint = 2420;
  if (S.x > 3400 && S.checkpoint < 3430) S.checkpoint = 3430;
  if (S.x > 4280 && S.checkpoint < 4300) S.checkpoint = 4300;

  /* avisos de zona */
  if (S.x > 560 && S.x < 700) avisoUnaVez("bodega", "Zona de carga suspendida: la <strong>sombra roja parpadeando</strong> marca dónde va a caer. Espera y pasa.");
  if (S.x > 1440 && S.x < 1560) avisoUnaVez("monta", "Montacargas en circulación. Activa el <strong>contacto visual</strong> y cruza cuando veas el ✓.");
  if (S.x > 2330 && S.x < 2470) avisoUnaVez("ruido", "Adelante hay 95 dB. Toma tus <strong>protectores</strong> de la caja naranja antes de entrar.");
  if (S.x > 3330 && S.x < 3470) avisoUnaVez("electrico", "¡Cable energizado! No te acerques: usa el punto de <strong>reporte</strong>.");

  /* cajas */
  cajas.forEach(c => {
    c.t += dt;
    const dur = CICLO[c.estado];
    if (c.t >= dur) {
      c.t = 0;
      c.estado = c.estado === "espera" ? "aviso" : c.estado === "aviso" ? "cae" : c.estado === "cae" ? "suelo" : "espera";
      if (c.estado === "cae") c.y = -80;
    }
    if (c.estado === "cae") {
      c.y = -80 + (c.t / CICLO.cae) * (PISO - 40 + 80);
      if (S.inv <= 0 && Math.abs(S.x - c.x) < 27 && c.y > PISO - 130) leccion("caida");
    }
  });

  /* montacargas */
  if (monta.pausa > 0) monta.pausa -= dt;
  else {
    monta.x += monta.dir * monta.vel * dt;
    if (monta.x > 2320) { monta.x = 2320; monta.dir = -1; }
    if (monta.x < 1640) { monta.x = 1640; monta.dir = 1; }
    /* pitido de reversa cuando está cerca */
    if (Math.abs(S.x - monta.x) < 190 && S.t - monta.beepT > 0.8) { monta.beepT = S.t; sndBeep(); }
    if (S.inv <= 0 && Math.abs(S.x - monta.x) < 58 && S.x > 1580 && S.x < 2380) leccion("monta");
  }

  /* ruido */
  const enRuido = S.x > 2560 && S.x < 3260;
  if (enRuido && !S.oidos) {
    S.bien = clamp(S.bien - 3 * dt, 0, 100);
    avisoUnaVez("ruidoDolor", "¡Ese ruido daña tu audición! Devuélvete por los protectores 🎧.", 5000);
  }

  /* cable */
  if (S.inv <= 0 && !S.flags.electrico && Math.abs(S.x - 3850) < 48) leccion("electrico");

  /* premios de zona limpia */
  if (S.x > 1400 && !S.flags.avisos.pBodega) {
    S.flags.avisos.pBodega = true;
    if (S.limpio.bodega) { S.puntos += 15; sndOk(); toast("Cruzaste la bodega sin un solo golpe. <strong>+15</strong>"); }
  }
  if (S.x > 2400 && !S.flags.avisos.pMonta) {
    S.flags.avisos.pMonta = true;
    if (S.limpio.monta) { S.puntos += 15; sndOk(); toast("Zona de montacargas superada sin incidentes. <strong>+15</strong>"); }
  }
  if (S.x > 3320 && !S.flags.avisos.pRuido) {
    S.flags.avisos.pRuido = true;
    if (S.oidos) { S.puntos += 15; sndOk(); toast("Zona de ruido cruzada con protección. <strong>+15</strong>"); }
  }

  /* evacuación */
  if (S.x > 4350 && !S.flags.alarma) {
    S.flags.alarma = true; S.flags.evacT0 = S.t;
    toast("🚨 ¡Alarma de evacuación! Sigue las flechas verdes hasta el <strong>punto de encuentro</strong>. Paso firme, sin correr.", 5000);
    sndAlerta();
  }
  if (S.flags.alarma && !S.fin && Math.floor(S.t * 1.2) !== Math.floor((S.t - dt) * 1.2)) sndAlerta();
  if (S.flags.alarma && S.x > 5480 && !S.fin) terminar();

  /* botón grande de interacción */
  const it = interCercano();
  if (it && !S.pausado) {
    accionUI.textContent = "⚡ " + it.label;
    accionUI.style.display = "block";
  } else {
    accionUI.style.display = "none";
  }
  document.getElementById("objTxt").textContent = objetivoActual().txt;
  hud();
}

/* ---------- Final ---------- */
function terminar() {
  S.fin = true; S.pausado = true;
  accionUI.style.display = "none";
  const evacT = S.t - S.flags.evacT0;
  S.puntos += 25;
  if (evacT < 30) { S.puntos += 10; S.flags.evacBonus = true; }
  const pct = clamp(Math.round((S.puntos / MAX) * 100), 0, 100);
  const niv = pct >= 90 ? "Líder SST" : pct >= 70 ? "Nivel Seguro" : pct >= 50 ? "Nivel Preventivo" : "Nivel Básico";
  const medallas = [
    { n: "Cero golpes", ico: "🛡️", ok: S.errores === 0 },
    { n: "Reportero en acción", ico: "📣", ok: S.reportes >= 2 },
    { n: "Evacuación ejemplar", ico: "🏃", ok: S.flags.evacBonus }
  ];
  try {
    const arr = JSON.parse(localStorage.getItem("ts_sesiones") || "[]");
    arr.unshift({ nombre: S.nombre, fecha: new Date().toLocaleString("es-CO"), modo: "Aventura",
                  puntos: S.puntos, pct: pct, nivel: niv, errores: S.errores, errs: S.errs });
    localStorage.setItem("ts_sesiones", JSON.stringify(arr.slice(0, 100)));
  } catch (e) {}
  panel(
    '<div style="text-align:center;font-size:40px">🏁</div>' +
    '<h2 style="text-align:center">' + escHtml(S.nombre) + ', ¡llegaste al punto de encuentro!</h2>' +
    '<div class="res-pct">' + pct + '%</div>' +
    '<span class="nivel">' + S.puntos + ' / ' + MAX + ' pts · ' + niv + ' · Bienestar ' + Math.round(S.bien) + '%</span>' +
    '<div class="medallas">' +
    medallas.map(m => '<div class="medalla ' + (m.ok ? "" : "off") + '"><span class="ico">' + m.ico + '</span>' + m.n + '</div>').join("") +
    '</div>' +
    (S.errores ? '<div class="exp"><strong>PREVI:</strong> Tuviste ' + S.errores + ' incidente(s). En el modo clásico puedes repasar esos riesgos con calma.</div>'
               : '<div class="exp"><strong>PREVI:</strong> Turno impecable: ni un solo incidente. Así se ve la cultura preventiva en acción. 🏆</div>') +
    '<button class="btn" onclick="location.reload()">Jugar de nuevo</button>' +
    '<button class="btn sec" onclick="location.href=\'index.html\'">Volver al menú</button>', "ok");
  if (pct >= 70) confeti();
  sndOk();
}
function escHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function confeti() {
  const c = document.createElement("div"); c.className = "confetti";
  const cols = ["#00795C","#F2B705","#0A5CA8","#E57373","#FFD54F"];

  setTimeout(() => c.remove(), 5500);
}

/* ---------- Dibujo ---------- */
function rr(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath();
}
function tono(hex, f) {
  const n = hex.replace("#", "");
  const p = [n.slice(0, 2), n.slice(2, 4), n.slice(4, 6)];
  return "#" + p.map(h => {
    let v = parseInt(h, 16);
    v = f < 0 ? Math.round(v * (1 + f)) : Math.round(v + (255 - v) * f);
    return ("0" + Math.max(0, Math.min(255, v)).toString(16)).slice(-2);
  }).join("");
}
/* caja con volumen 2.5D: cara superior iluminada + lateral en sombra */
function box3d(x, y, w, h, d, col) {
  const dx = d * 0.6, dy = d * 0.45;
  ctx.fillStyle = tono(col, 0.30);
  ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + dx, y - dy); ctx.lineTo(x + w + dx, y - dy); ctx.lineTo(x + w, y); ctx.closePath(); ctx.fill();
  ctx.fillStyle = tono(col, -0.24);
  ctx.beginPath(); ctx.moveTo(x + w, y); ctx.lineTo(x + w + dx, y - dy); ctx.lineTo(x + w + dx, y + h - dy); ctx.lineTo(x + w, y + h); ctx.closePath(); ctx.fill();
  ctx.fillStyle = col;
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = "rgba(31,38,42,0.28)"; ctx.lineWidth = 1.5;
  ctx.strokeRect(x, y, w, h);
}
function sombraPie(x, w) {
  ctx.fillStyle = "rgba(31,38,42,0.18)";
  ctx.beginPath(); ctx.ellipse(x, PISO - 2, w, w * 0.16, 0, 0, 7); ctx.fill();
}
/* polvo ambiental */
const polvo = [];
for (let i = 0; i < 34; i++) polvo.push({ x: Math.random() * MUNDO, y: 60 + Math.random() * 330, f: 0.5 + Math.random() * 1.5 });

const TITULOS = [
  { x: 130, t: "VESTIER" }, { x: 960, t: "BODEGA" }, { x: 1930, t: "MONTACARGAS" },
  { x: 2860, t: "ZONA DE RUIDO" }, { x: 3760, t: "TABLERO ELÉCTRICO" }, { x: 4900, t: "RUTA DE EVACUACIÓN" }
];

function draw() {
  const cam = clamp(S.x - W * 0.42, 0, MUNDO - W);
  camActual = cam;

  /* pared con gradiente */
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, "#B9C6C0"); g.addColorStop(0.16, "#E9EFEA"); g.addColorStop(0.75, "#D5DED7"); g.addColorStop(1, "#C6D0C8");
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  /* parallax lejano: ventanas, cerchas y tubería */
  ctx.save(); ctx.translate(-cam * 0.35, 0);
  for (let x = 60; x < MUNDO * 0.5 + W; x += 300) {
    const vg = ctx.createLinearGradient(0, 66, 0, 150);
    vg.addColorStop(0, "rgba(200,225,240,0.85)"); vg.addColorStop(1, "rgba(150,185,205,0.5)");
    ctx.fillStyle = vg; rr(x, 66, 160, 84, 8); ctx.fill();
    ctx.strokeStyle = "rgba(110,130,140,0.4)"; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(x + 80, 66); ctx.lineTo(x + 80, 150); ctx.moveTo(x, 108); ctx.lineTo(x + 160, 108); ctx.stroke();
  }
  ctx.strokeStyle = "rgba(120,140,150,0.4)"; ctx.lineWidth = 6;
  for (let x = -100; x < MUNDO * 0.5 + W; x += 220) {
    ctx.beginPath(); ctx.moveTo(x, 40); ctx.lineTo(x + 110, 10); ctx.lineTo(x + 220, 40); ctx.stroke();
  }
  ctx.strokeStyle = "rgba(96,125,139,0.5)"; ctx.lineWidth = 9;
  ctx.beginPath(); ctx.moveTo(-100, 178); ctx.lineTo(MUNDO * 0.5 + W, 178); ctx.stroke();
  ctx.fillStyle = "rgba(96,125,139,0.5)";
  for (let x = 40; x < MUNDO * 0.5 + W; x += 260) ctx.fillRect(x, 172, 14, 12);
  ctx.restore();

  /* parallax medio: máquinas y estibas */
  ctx.save(); ctx.translate(-cam * 0.65, 0);
  for (let x = 40; x < MUNDO * 0.75 + W; x += 460) {
    ctx.fillStyle = "rgba(90,110,105,0.30)";
    ctx.fillRect(x, 260, 150, 190); ctx.fillRect(x + 46, 218, 58, 44);
    ctx.fillRect(x + 240, 310, 110, 140);
    ctx.fillStyle = "rgba(90,110,105,0.22)";
    ctx.fillRect(x + 250, 292, 90, 14); ctx.fillRect(x + 258, 274, 74, 14);
  }
  ctx.restore();

  /* mundo */
  ctx.save(); ctx.translate(-cam, 0);

  /* lámparas colgantes con cono de luz */
  for (let x = 200; x < MUNDO; x += 420) {
    ctx.strokeStyle = "rgba(70,90,100,0.55)"; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 44); ctx.stroke();
    ctx.fillStyle = "#546E7A"; rr(x - 26, 44, 52, 14, 6); ctx.fill();
    ctx.fillStyle = "#FFF6D8"; rr(x - 18, 52, 36, 7, 3); ctx.fill();
    const lg = ctx.createLinearGradient(0, 58, 0, PISO);
    lg.addColorStop(0, "rgba(255,244,200,0.30)"); lg.addColorStop(1, "rgba(255,244,200,0)");
    ctx.fillStyle = lg;
    ctx.beginPath(); ctx.moveTo(x - 20, 58); ctx.lineTo(x + 20, 58);
    ctx.lineTo(x + 120, PISO); ctx.lineTo(x - 120, PISO); ctx.closePath(); ctx.fill();
  }

  /* títulos de zona pintados en la pared */
  ctx.textAlign = "center"; ctx.font = "900 34px Segoe UI";
  TITULOS.forEach(z => {
    ctx.fillStyle = "rgba(31,38,42,0.14)";
    ctx.fillText(z.t, z.x, 236);
  });

  /* piso en perspectiva: las juntas convergen hacia el fondo */
  const fg2 = ctx.createLinearGradient(0, PISO, 0, H);
  fg2.addColorStop(0, "#C9D2CA"); fg2.addColorStop(0.45, "#B2BDB4"); fg2.addColorStop(1, "#95A198");
  ctx.fillStyle = fg2; ctx.fillRect(cam - 20, PISO, W + 40, H - PISO);
  ctx.strokeStyle = "rgba(31,38,42,0.15)"; ctx.lineWidth = 2;
  for (let x = Math.floor(cam / 90) * 90; x < cam + W + 200; x += 90) {
    const sx = x - cam;
    ctx.beginPath(); ctx.moveTo(x, PISO);
    ctx.lineTo(x + (sx - W / 2) * 0.45, H + 8); ctx.stroke();
  }
  /* juntas horizontales: más separadas cuanto más cerca del espectador */
  [[9, 0.08], [24, 0.11], [48, 0.14], [80, 0.17]].forEach(p => {
    ctx.strokeStyle = "rgba(31,38,42," + p[1] + ")"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(cam - 20, PISO + p[0]); ctx.lineTo(cam + W + 20, PISO + p[0]); ctx.stroke();
  });
  /* brillo especular del piso pulido, cerca del fondo */
  ctx.fillStyle = "rgba(255,255,255,0.18)";
  ctx.fillRect(cam - 20, PISO + 1, W + 40, 6);
  ctx.strokeStyle = "rgba(31,38,42,0.3)"; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(cam - 20, PISO); ctx.lineTo(cam + W + 20, PISO); ctx.stroke();

  /* franja amarilla de seguridad al pie de la pared */
  ctx.fillStyle = "rgba(242,183,5,0.5)";
  ctx.fillRect(cam - 20, PISO + 2, W + 40, 5);

  dibujarVestier();
  dibujarBodega();
  dibujarMontacargas();
  dibujarRuido();
  dibujarElectrico();
  dibujarEvacuacion();

  /* polvo ambiental */
  ctx.fillStyle = "rgba(255,255,255,0.5)";
  polvo.forEach(p => {
    const px = p.x + Math.sin(S.t * 0.4 * p.f + p.y) * 22;
    const py = p.y + Math.sin(S.t * 0.55 * p.f) * 14;
    if (px > cam - 10 && px < cam + W + 10) { ctx.beginPath(); ctx.arc(px, py, 1.6, 0, 7); ctx.fill(); }
  });

  /* prompts de interacción */
  INTER.forEach(it => {
    if (!it.activo()) return;
    const cerca = Math.abs(S.x - it.x) < RADIO_INTER;
    const bob = Math.sin(S.t * 5) * 5;
    if (cerca) {
      ctx.fillStyle = "rgba(255,255,255,0.95)";
      rr(it.x - 17, 282 + bob, 34, 34, 17); ctx.fill();
      ctx.strokeStyle = "#00795C"; ctx.lineWidth = 3;
      rr(it.x - 17, 282 + bob, 34, 34, 17); ctx.stroke();
      ctx.fillStyle = "#00795C"; ctx.font = "800 19px Segoe UI"; ctx.textAlign = "center";
      ctx.fillText("⚡", it.x, 306 + bob);
    } else {
      ctx.fillStyle = "rgba(0,121,92,0.75)";
      ctx.beginPath(); ctx.arc(it.x, 300, 11, 0, 7); ctx.fill();
      ctx.fillStyle = "#fff"; ctx.font = "800 12px Segoe UI"; ctx.textAlign = "center";
      ctx.fillText("⚡", it.x, 304);
    }
  });

  /* marcador del punto tocado (a dónde camina) */
  if (targetX !== null) {
    const k = (S.t * 2) % 1;
    ctx.strokeStyle = "rgba(10,92,168," + (1 - k) + ")"; ctx.lineWidth = 3.5;
    ctx.beginPath(); ctx.ellipse(targetX, PISO - 2, 12 + k * 22, (12 + k * 22) * 0.3, 0, 0, 7); ctx.stroke();
    ctx.fillStyle = "#0A5CA8";

  }

  /* objetivo: anillo pulsante en el suelo + flecha */

  if (Math.abs(obj.x - S.x) > 100) {

    ctx.beginPath(); ctx.ellipse(obj.x, PISO - 2, 16 + k2 * 26, (16 + k2 * 26) * 0.3, 0, 0, 7); ctx.stroke();
    const objEnPantalla = obj.x > cam + 30 && obj.x < cam + W - 30;
    if (objEnPantalla) {
      const bob = Math.sin(S.t * 4) * 6;
      ctx.fillStyle = "#F2B705"; ctx.strokeStyle = "#8A6200"; ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(obj.x - 12, 250 + bob); ctx.lineTo(obj.x + 12, 250 + bob); ctx.lineTo(obj.x, 268 + bob);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      /* mano de tutorial hasta el primer toque */
      if (!S.flags.avisos.primerTap && !S.pausado) {
        ctx.font = "34px Segoe UI"; ctx.textAlign = "center";
        ctx.fillText("👆", obj.x, PISO - 46 + Math.sin(S.t * 4) * 8);
        ctx.font = "800 15px Segoe UI"; ctx.fillStyle = "#1F262A";
        ctx.fillText("Toca aquí", obj.x, PISO - 88);
      }
    }
  }
  ctx.restore();

  /* flecha de borde si el objetivo está fuera de pantalla */
  if (obj.x > cam + W - 30) {
    const bob = Math.sin(S.t * 4) * 4;
    ctx.fillStyle = "rgba(242,183,5,0.95)";
    ctx.beginPath();
    ctx.moveTo(W - 46 + bob, 236); ctx.lineTo(W - 16 + bob, 258); ctx.lineTo(W - 46 + bob, 280);
    ctx.closePath(); ctx.fill();
  } else if (obj.x < cam + 30) {
    const bob = Math.sin(S.t * 4) * 4;
    ctx.fillStyle = "rgba(242,183,5,0.95)";
    ctx.beginPath();
    ctx.moveTo(46 - bob, 236); ctx.lineTo(16 - bob, 258); ctx.lineTo(46 - bob, 280);
    ctx.closePath(); ctx.fill();
  }

  ctx.save(); ctx.translate(-cam, 0);
  dibujarPrevi();
  dibujarJugador();
  ctx.restore();

  /* PRIMER PLANO con parallax inverso: pasa por delante y vende la profundidad
     (anclado abajo y arriba para no tapar nunca al personaje ni las estaciones) */
  ctx.save(); ctx.translate(-cam * 1.4, 0);
  for (let x = 420; x < MUNDO * 1.4 + W; x += 1500) {
    /* barriles en primer plano */
    ctx.fillStyle = "rgba(40,52,56,0.88)";
    rr(x, H - 86, 52, 96, 9); ctx.fill();
    rr(x + 36, H - 66, 52, 76, 9); ctx.fill();
    ctx.fillStyle = "rgba(74,90,96,0.88)";
    ctx.fillRect(x, H - 70, 52, 6); ctx.fillRect(x + 36, H - 52, 52, 6);
  }
  for (let x = 1150; x < MUNDO * 1.4 + W; x += 1900) {
    /* estiba con cajas en primer plano */
    ctx.fillStyle = "rgba(52,42,34,0.88)";
    ctx.fillRect(x, H - 34, 130, 14);
    ctx.fillStyle = "rgba(64,52,40,0.88)";
    rr(x + 12, H - 88, 52, 56, 5); ctx.fill();
    rr(x + 66, H - 74, 46, 42, 5); ctx.fill();
  }
  for (let x = 700; x < MUNDO * 1.4 + W; x += 2300) {
    /* poste bajo con cinta de precaución */
    ctx.fillStyle = "rgba(38,48,52,0.9)";
    ctx.fillRect(x, H - 120, 12, 130);
    ctx.fillStyle = "rgba(242,183,5,0.6)";
    ctx.fillRect(x - 2, H - 112, 16, 16);
  }
  /* tubería colgante en primerísimo plano (borde superior) */
  ctx.strokeStyle = "rgba(34,44,48,0.75)"; ctx.lineWidth = 16;
  ctx.beginPath(); ctx.moveTo(cam * 1.4 - 20, 14); ctx.lineTo(cam * 1.4 + W + 20, 14); ctx.stroke();
  for (let x = 300; x < MUNDO * 1.4 + W; x += 800) {
    ctx.fillStyle = "rgba(34,44,48,0.75)";
    ctx.fillRect(x, 6, 18, 26);
  }
  ctx.restore();

  /* borde rojo si estás en ruido sin protección */
  if (S.x > 2560 && S.x < 3260 && !S.oidos) {
    ctx.strokeStyle = "rgba(182,34,51," + (0.28 + Math.sin(S.t * 14) * 0.16) + ")";
    ctx.lineWidth = 18; ctx.strokeRect(4, 4, W - 8, H - 8);
  }

  /* viñeta sutil */
  const vg = ctx.createRadialGradient(W / 2, H / 2, H * 0.45, W / 2, H / 2, H * 0.95);
  vg.addColorStop(0, "rgba(0,0,0,0)"); vg.addColorStop(1, "rgba(20,26,24,0.28)");
  ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);
}

function dibujarBodega() {
  ctx.fillStyle = "#616161"; ctx.fillRect(660, 130, 10, 318); ctx.fillRect(1330, 130, 10, 318);
  box3d(660, 150, 680, 10, 12, "#757575");
  [730, 900, 1090, 1250].forEach(x => box3d(x, 96, 54, 52, 11, "#BC8F5E"));
  if (!S.flags.apilado) {
    ctx.save(); ctx.translate(1385, 108); ctx.rotate(0.28);
    ctx.fillStyle = "#BC8F5E"; ctx.fillRect(-26, -24, 52, 48); ctx.strokeStyle = "#8D6E4E"; ctx.strokeRect(-26, -24, 52, 48);
    ctx.restore();
    ctx.fillStyle = "#B62233"; ctx.font = "900 22px Segoe UI"; ctx.textAlign = "center";
    if (Math.sin(S.t * 6) > 0) ctx.fillText("!", 1385, 70);
  }
  ctx.fillStyle = "rgba(242,183,5,0.4)"; ctx.fillRect(680, PISO + 26, 660, 26);
  /* franja roja bajo cada punto de caída activo */
  cajas.forEach(c => {
    if (c.estado === "aviso" || c.estado === "cae") {
      ctx.fillStyle = "rgba(182,34,51," + (0.25 + Math.abs(Math.sin(S.t * 6)) * 0.2) + ")";
      ctx.fillRect(c.x - 40, PISO + 8, 80, 18);
    }
  });
  cajas.forEach(c => {
    if (c.estado === "aviso") {
      if (Math.sin(S.t * 12) > -0.3) {
        ctx.fillStyle = "rgba(182,34,51,0.42)";
        ctx.beginPath(); ctx.ellipse(c.x, PISO - 2, 40, 9, 0, 0, 7); ctx.fill();
      }
      ctx.fillStyle = "#B62233"; ctx.font = "900 22px Segoe UI"; ctx.textAlign = "center";
      ctx.fillText("⚠", c.x, PISO - 64);
    }
    if (c.estado === "cae" || c.estado === "suelo") {
      const y = c.estado === "cae" ? c.y : PISO - 44;
      if (c.estado === "suelo") sombraPie(c.x + 4, 34);
      box3d(c.x - 24, y, 48, 44, 11, "#BC8F5E");
    }
  });
}

function dibujarMontacargas() {
  ctx.fillStyle = "rgba(255,255,255,0.85)";
  for (let i = 0; i < 5; i++) ctx.fillRect(2340 + i * 4, PISO + 12 + i * 8, 90, 5);
  const m = monta;
  /* franja de estado en el piso: rojo = en movimiento, verde = detenido (cruza) */
  if (m.pausa > 0) {
    ctx.fillStyle = "rgba(0,121,92,0.30)";
    ctx.fillRect(1600, PISO + 8, 760, 18);
  } else {
    ctx.fillStyle = "rgba(182,34,51," + (0.22 + Math.abs(Math.sin(S.t * 5)) * 0.15) + ")";
    ctx.fillRect(m.x - 85, PISO + 8, 170, 18);
  }
  /* sombra */
  ctx.fillStyle = "rgba(31,38,42,0.2)";
  ctx.beginPath(); ctx.ellipse(m.x + 10, PISO - 4, 62, 8, 0, 0, 7); ctx.fill();
  ctx.save(); ctx.translate(m.x, PISO - 66);
  if (m.dir < 0) ctx.scale(-1, 1);
  ctx.fillStyle = "#F57F17"; rr(-46, 12, 86, 40, 7); ctx.fill();
  ctx.fillStyle = "rgba(255,255,255,0.3)"; rr(-46, 12, 86, 10, 5); ctx.fill();
  ctx.fillStyle = "rgba(31,38,42,0.18)"; rr(24, 12, 16, 40, 5); ctx.fill();
  ctx.fillStyle = "#455A64"; ctx.fillRect(-38, -28, 7, 42); ctx.fillRect(16, -28, 7, 42); ctx.fillRect(-42, -32, 70, 6);
  ctx.fillStyle = "#37474F"; ctx.fillRect(46, -20, 6, 78);
  ctx.fillRect(52, 40, 30, 5); ctx.fillRect(52, 52, 30, 5);
  ctx.fillStyle = "#BC8F5E"; ctx.fillRect(54, 8, 30, 32); ctx.strokeStyle = "#8D6E4E"; ctx.strokeRect(54, 8, 30, 32);
  ctx.fillStyle = "#212121";
  ctx.beginPath(); ctx.arc(-26, 56, 13, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.arc(22, 56, 13, 0, 7); ctx.fill();
  ctx.fillStyle = "#78909C";
  ctx.beginPath(); ctx.arc(-26, 56, 5, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.arc(22, 56, 5, 0, 7); ctx.fill();
  ctx.fillStyle = "#D9A066"; ctx.beginPath(); ctx.arc(-8, -6, 9, 0, 7); ctx.fill();
  ctx.fillStyle = "#F2B705"; ctx.beginPath(); ctx.arc(-8, -9, 9, Math.PI, 0); ctx.fill();
  if (m.pausa > 0) {

    ctx.fillText("✓", -8, -34);
  }
  ctx.restore();
  if (m.pausa <= 0 && Math.sin(S.t * 10) > 0) {
    ctx.fillStyle = "#F57F17";
    ctx.beginPath(); ctx.arc(m.x - (m.dir > 0 ? 42 : -42), PISO - 100, 5, 0, 7); ctx.fill();
  }
}

function dibujarElectrico() {
  box3d(3560, 220, 80, 120, 13, "#78909C");
  ctx.fillStyle = "#455A64"; ctx.fillRect(3572, 234, 56, 30);
  ["#B62233", "#F2B705", "#00795C"].forEach((c, i) => {

  });
  /* franja de estado en el piso */
  if (!S.flags.electrico) {
    ctx.fillStyle = "rgba(182,34,51," + (0.22 + Math.abs(Math.sin(S.t * 5)) * 0.15) + ")";
    ctx.fillRect(3790, PISO + 8, 130, 18);
  } else {
    ctx.fillStyle = "rgba(0,121,92,0.30)";

  }
  ctx.strokeStyle = "#B62233"; ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(3640, 340); ctx.quadraticCurveTo(3760, 420, 3850, PISO - 4); ctx.stroke();
  if (!S.flags.electrico) {
    if (Math.sin(S.t * 18) > 0) {
      ctx.strokeStyle = "#F2B705"; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(3850, PISO - 8); ctx.lineTo(3840, PISO - 26); ctx.lineTo(3852, PISO - 22); ctx.lineTo(3844, PISO - 42); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(3856, PISO - 6); ctx.lineTo(3868, PISO - 22); ctx.stroke();
    }
    ctx.fillStyle = "#B62233"; ctx.font = "900 22px Segoe UI"; ctx.textAlign = "center";
    if (Math.sin(S.t * 6) > 0) ctx.fillText("⚡", 3850, PISO - 60);
  } else {
    ctx.fillStyle = "#F57F17";
    ctx.beginPath(); ctx.moveTo(3790, PISO); ctx.lineTo(3806, PISO - 40); ctx.lineTo(3822, PISO); ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#fff"; ctx.fillRect(3796, PISO - 22, 20, 7);
    if (tecnico.visible && S.t > tecnico.llega) {
      ctx.fillStyle = "#D9A066"; ctx.beginPath(); ctx.arc(3950, PISO - 88, 12, 0, 7); ctx.fill();
      ctx.fillStyle = "#0A5CA8"; rr(3936, PISO - 76, 28, 44, 6); ctx.fill();
      ctx.fillStyle = "#F2B705"; ctx.beginPath(); ctx.arc(3950, PISO - 92, 12, Math.PI, 0); ctx.fill();
      ctx.fillStyle = "#37474F"; ctx.fillRect(3938, PISO - 32, 9, 32); ctx.fillRect(3953, PISO - 32, 9, 32);

      ctx.fillText("✓", 3950, PISO - 108);
    }
  }
  ctx.fillStyle = "#F2B705";
  ctx.beginPath(); ctx.moveTo(3700, 200); ctx.lineTo(3722, 238); ctx.lineTo(3678, 238); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = "#23272B"; ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = "#1F262A"; ctx.font = "900 17px Segoe UI"; ctx.textAlign = "center";
  ctx.fillText("⚡", 3700, 233);
}

function dibujarEvacuacion() {

  ctx.fillStyle = "#00795C"; rr(5360, 170, 130, 40, 6); ctx.fill();

  sombraPie(5522, 62);

}

function dibujarPrevi() {
  const px = S.x - S.dir * 58, py = 244 + Math.sin(S.t * 2.4) * 8;
  ctx.strokeStyle = "#607D8B"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(px, py - 22); ctx.lineTo(px, py - 15); ctx.stroke();
  ctx.fillStyle = "#78909C";
  const hw = 12 * Math.abs(Math.sin(S.t * 12)) + 3;
  ctx.beginPath(); ctx.ellipse(px, py - 24, hw, 2.4, 0, 0, 7); ctx.fill();
  ctx.fillStyle = "#F2B705"; ctx.strokeStyle = "#C99700"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(px, py, 16, Math.PI, 0); ctx.fill(); ctx.stroke();
  rr(px - 20, py - 2, 40, 7, 3.5); ctx.fill(); ctx.stroke();
  /* ojos que parpadean */
  const parpadeo = Math.sin(S.t * 0.9) > 0.97;
  ctx.fillStyle = "#212121";
  if (parpadeo) { ctx.fillRect(px - 9, py - 7, 6, 2); ctx.fillRect(px + 3, py - 7, 6, 2); }
  else {
    ctx.beginPath(); ctx.arc(px - 6, py - 6, 3, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(px + 6, py - 6, 3, 0, 7); ctx.fill();
  }
}

function dibujarJugador() {
  const x = S.x, y = PISO;
  if (S.inv > 0 && Math.sin(S.t * 18) > 0) return; /* parpadeo de invulnerabilidad */
  ctx.fillStyle = "rgba(31,38,42,0.25)";
  ctx.beginPath(); ctx.ellipse(x, y - 3, 27, 7, 0, 0, 7); ctx.fill();
  ctx.save(); ctx.translate(x, y - 92);
  ctx.scale(S.dir < 0 ? -1.18 : 1.18, 1.18);
  const paso = S.andando ? Math.sin(S.animT) * 9 : 0;
  /* piernas */
  ctx.fillStyle = "#37474F";
  rr(-11 + paso * 0.5, 46, 10, 28, 4); ctx.fill();
  rr(2 - paso * 0.5, 46, 10, 28, 4); ctx.fill();
  ctx.fillStyle = "#212121";
  rr(-13 + paso * 0.5, 70, 14, 7, 3); ctx.fill();
  rr(0 - paso * 0.5, 70, 14, 7, 3); ctx.fill();
  /* brazos (balancean al contrario de las piernas) */
  ctx.fillStyle = "#0E4DA0";
  rr(-22 - paso * 0.4, 12, 8, 26, 4); ctx.fill();
  rr(14 + paso * 0.4, 12, 8, 26, 4); ctx.fill();
  /* torso */
  ctx.fillStyle = "#1565C0"; rr(-15, 10, 30, 40, 7); ctx.fill();
  if (S.epp) {
    ctx.fillStyle = "#F57F17"; rr(-15, 10, 30, 27, 7); ctx.fill();
    ctx.fillStyle = "#FFF59D"; ctx.fillRect(-15, 19, 30, 4);
  }
  ctx.strokeStyle = "rgba(31,38,42,0.3)"; ctx.lineWidth = 1.5;
  rr(-15, 10, 30, 40, 7); ctx.stroke();
  /* sombreado lateral (volumen) */
  ctx.fillStyle = "rgba(31,38,42,0.12)";
  rr(5, 10, 10, 40, 6); ctx.fill();
  /* cabeza */
  ctx.fillStyle = "#D9A066"; ctx.beginPath(); ctx.arc(0, -2, 14, 0, 7); ctx.fill();
  ctx.fillStyle = "#212121";
  ctx.beginPath(); ctx.arc(4, -5, 1.8, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.arc(10, -5, 1.8, 0, 7); ctx.fill();
  ctx.strokeStyle = "#212121"; ctx.lineWidth = 1.4;
  ctx.beginPath(); ctx.arc(6, 2, 4, 0.2, Math.PI - 0.4); ctx.stroke();
  if (S.epp) { ctx.strokeStyle = "rgba(255,255,255,0.9)"; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(7, -5, 6, 0, 7); ctx.stroke(); }
  if (S.oidos) {
    ctx.fillStyle = "#F57F17";
    ctx.beginPath(); ctx.arc(-6, -4, 5, 0, 7); ctx.fill();
    ctx.strokeStyle = "#F57F17"; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(0, -8, 11, Math.PI, 0); ctx.stroke();
  }
  if (S.epp) {
    ctx.fillStyle = "#F2B705"; ctx.strokeStyle = "#C99700"; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(0, -8, 14, Math.PI, 0); ctx.fill(); ctx.stroke();
    ctx.fillRect(-16, -9, 32, 5);
    ctx.strokeStyle = "#FFF176"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(-2, -11, 9, Math.PI * 1.15, Math.PI * 1.6); ctx.stroke();
  } else {
    ctx.fillStyle = "#4E342E";
    ctx.beginPath(); ctx.arc(0, -6, 13.5, Math.PI, 0); ctx.fill();
  }
  ctx.restore();
}

/* ---------- Bucle ---------- */
let tPrev = performance.now();
function loop(t) {
  const dt = clamp((t - tPrev) / 1000, 0, 0.05);
  tPrev = t;
  if (!S.pausado && !S.fin) {
    if (accionPulsada) { accionPulsada = false; accionar(); }
    update(dt);
  } else {
    accionPulsada = false;
  }
  draw();
  requestAnimationFrame(loop);
}

    '<div class="ctl-demo">' +
    '<div class="k" style="border-color:var(--green)">👆<small><strong>Toca a dónde ir</strong><br>y el personaje camina solo</small></div>' +

function empezar() {
  const n = document.getElementById("nombre").value.trim();

  toast("¡Buen turno, " + escHtml(S.nombre) + "! <strong>Toca el casillero</strong> (donde está la mano 👆) y tu personaje irá solo.", 5600);
}

window.togKit = togKit; window.confKit = confKit; window.empezar = empezar;
window.reintentar = reintentar;
window.AV = { S, monta, cajas, leccion, accionar, terminar, update, INTER, objetivoActual,
              getTarget: () => targetX, setTarget: (x) => { targetX = x; } };

intro();
requestAnimationFrame(loop);
</script>
